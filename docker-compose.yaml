services:
  video-grouper:
    build:
      context: .
      dockerfile: ./video_grouper/Dockerfile
      args:
        VERSION: "1.0.0"
        BUILD_NUMBER: "1"
    volumes:
      - ./shared_data:/shared_data
      - ./video_grouper/config.ini:/app/config.ini
    environment:
      - PYTHONUNBUFFERED=1
    # Uncomment to expose the headless TTT auth server (also set
    # [TTT] auth_server_enabled = true in config.ini):
    ports:
      - "8765:8765"

  reolink-simulator:
    profiles:
      - simulator
      - reolink
    image: ghcr.io/mblakley/camera-simulator:main
    environment:
      - CAMERA_TYPE=reolink
      - USERNAME=admin
      - PASSWORD=mblakley82
      - DEVICE_NAME=SoccerCam
      - CLIPS_DIR=/clips
      - PYTHONUNBUFFERED=1
    volumes:
      - reolink-sim-data:/data
      - ./tests/e2e/test_clips:/clips:ro
    ports:
      - "8180:80"
      - "9000:9000"
      - "8080:8080"

  dahua-simulator:
    profiles:
      - simulator
      - dahua
    image: ghcr.io/mblakley/camera-simulator:main
    environment:
      - CAMERA_TYPE=dahua
      - USERNAME=admin
      - PASSWORD=admin
      - DEVICE_NAME=DahuaCam
      - CLIPS_DIR=/clips
    volumes:
      - dahua-sim-data:/data
      - ./tests/e2e/test_clips:/clips:ro
    ports:
      - "8181:80"
      - "8081:8080"

volumes:
  reolink-sim-data:
  dahua-sim-data:
