# End-to-End Test Configuration
# This configuration uses the camera simulator and mock services
# to provide a complete test environment without external dependencies

[CAMERA]
type = simulator
device_ip = 127.0.0.1
username = test_admin
password = test_admin

[STORAGE]
path = ./tests/e2e/test_data

[RECORDING]
# Duration in seconds
min_duration = 60
max_duration = 3600

[PROCESSING]
max_concurrent_downloads = 2
max_concurrent_conversions = 1
retry_attempts = 3
retry_delay = 5

[LOGGING]
level = DEBUG
log_dir = tests/e2e/test_logs
app_name = video_grouper_e2e_test
backup_count = 5

[APP]
check_interval_seconds = 30
timezone = America/New_York

[TEAMSNAP]
# Enable mock TeamSnap integration
enabled = true
client_id = mock_teamsnap_client_id
client_secret = mock_teamsnap_client_secret
access_token = mock_teamsnap_access_token

# Team configuration using the proper section format
[TEAMSNAP.TEAM.1]
enabled = true
team_id = team_hawks_456
team_name = Hawks

[PLAYMETRICS]
# Enable mock PlayMetrics integration
enabled = true
username = test@example.com
password = mock_playmetrics_password
team_id = team_lightning_789
team_name = Lightning

[NTFY]
# Enable NTFY integration for game start/end time detection
enabled = true
server_url = https://ntfy.sh
# Use a real topic for end-to-end testing - you can subscribe to this topic to receive notifications
topic = video_grouper_mblakley43431

[YOUTUBE]
# Enable YouTube uploads for complete e2e testing
enabled = true
privacy_status = private

[AUTOCAM]
# Enable real autocam processing
enabled = true
# Point to the real Once Autocam executable
executable = C:\Users\markb\AppData\Local\Programs\Once.Autocam\Once.Autocam.exe
# Disable mock mode to use real autocam
use_mock = false

# Playlist configuration for processed videos (testing)
[YOUTUBE.PLAYLIST.PROCESSED]
name_format = {my_team_name} 2024 Test Season
description = Test processed videos for {my_team_name}
privacy_status = unlisted

# Playlist configuration for raw videos (testing)
[YOUTUBE.PLAYLIST.RAW]
name_format = {my_team_name} 2024 Test Season - Full Field
description = Test raw full field videos for {my_team_name}
privacy_status = unlisted

[CLOUD_SYNC]
enabled = false
provider = none 