# Server worker config — DESKTOP-5L867J8
# The server handles staging, tiling, QA, and review tasks.
# Uses G: (SSD) for local processing, D: for storage.

[worker]
hostname = "DESKTOP-5L867J8"
capabilities = ["stage", "tile", "sonnet_qa", "generate_review", "ingest_reviews"]
server_share = ""                  # server accesses D: directly, no share needed
queue_db = "D:/training_data/work_queue.db"
local_work_dir = "G:/pipeline_work"
local_models_dir = "D:/training_data/models"

[resources]
max_gpu_temp = 85
min_disk_free_gb = 10              # G: drive has less space
gpu_device = 0
idle_games = []                    # server is always available

[heartbeat]
interval = 30
