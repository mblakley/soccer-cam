# Laptop worker config — jared-laptop
# Connects to server API, pulls work to local SSD, pushes results back.

[worker]
hostname = "jared-laptop"
capabilities = ["tile", "label"]  # train temporarily removed — prioritizing labeling
api_url = "http://192.168.86.152:8643"
server_share = '\\192.168.86.152\training'
local_work_dir = "C:/soccer-cam-label/work"
local_models_dir = "C:/soccer-cam-label/models"

[resources]
max_gpu_temp = 85
min_disk_free_gb = 20
gpu_device = 0
idle_games = []
# CUDA DLLs from system torch — added to PATH on worker startup
cuda_path = "C:/Python313/Lib/site-packages/torch/lib"

[heartbeat]
interval = 30

[logging]
log_dir = "C:/soccer-cam-label/logs"
