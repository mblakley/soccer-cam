<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Ball Annotation</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --gray: #6b7280;
  --bg: #111;
  --surface: #1a1a1a;
  --text: #f0f0f0;
  --text-dim: #888;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* Pages */
.page { display: none; height: 100%; flex-direction: column; }
.page.active { display: flex; }

/* Header bar */
.header {
  display: flex; align-items: center; padding: 12px 16px;
  background: var(--surface); border-bottom: 1px solid #333;
  flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 600; flex: 1; }
.header-btn {
  background: none; border: none; color: var(--text); font-size: 16px;
  padding: 8px 12px; cursor: pointer; border-radius: 8px;
}
.header-btn:active { background: #333; }
.header-btn.active { background: var(--blue); color: #fff; }

/* Packet list */
#packet-list-page .content { flex: 1; overflow-y: auto; padding: 12px; }

.packet-card {
  background: var(--surface); border-radius: 12px; padding: 16px;
  margin-bottom: 10px; cursor: pointer; border: 1px solid #333;
  transition: background 0.1s;
}
.packet-card:active { background: #252525; }
.packet-card .title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
.packet-card .meta { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.packet-card .progress-bar {
  height: 6px; background: #333; border-radius: 3px; overflow: hidden;
}
.packet-card .progress-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s;
}
.packet-card .progress-fill.pending { background: var(--gray); width: 0; }
.packet-card .progress-fill.partial { background: var(--blue); }
.packet-card .progress-fill.complete { background: var(--green); }

.status-badge {
  display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; margin-left: 8px;
}
.status-badge.pending { background: #333; color: var(--text-dim); }
.status-badge.partial { background: #1e3a5f; color: var(--blue); }
.status-badge.complete { background: #14532d; color: var(--green); }

/* Nav tabs */
.nav-tabs {
  display: flex; background: var(--surface); border-top: 1px solid #333;
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
}
.nav-tab {
  flex: 1; padding: 12px 0; text-align: center; font-size: 13px;
  color: var(--text-dim); background: none; border: none; cursor: pointer;
}
.nav-tab.active { color: var(--blue); }
.nav-tab span { display: block; font-size: 20px; margin-bottom: 2px; }

/* Annotate page */
#annotate-page { position: relative; }

.annotate-header {
  display: flex; align-items: center; padding: 8px 12px;
  background: var(--surface); border-bottom: 1px solid #333;
  flex-shrink: 0; gap: 10px;
}
.annotate-header .back-btn {
  background: none; border: none; color: var(--text); font-size: 22px;
  padding: 6px 10px; cursor: pointer; border-radius: 8px;
}
.annotate-header .back-btn:active { background: #333; }
.annotate-header .progress-text { font-size: 14px; font-weight: 600; }
.annotate-header .progress-track {
  flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden;
}
.annotate-header .progress-inner {
  height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s;
}

.annotate-body {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  position: relative;
}

.frame-reason {
  text-align: center; padding: 6px 0; font-size: 12px; color: var(--text-dim);
  flex-shrink: 0; background: var(--surface);
}

.canvas-container {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; padding: 4px;
}
.canvas-container canvas {
  max-width: 100%; max-height: 100%; object-fit: contain;
  touch-action: none;
}

.action-bar {
  display: flex; gap: 8px; padding: 10px 12px;
  background: var(--surface); border-top: 1px solid #333;
  flex-shrink: 0; padding-bottom: max(10px, var(--safe-bottom));
}
.action-btn {
  flex: 1; padding: 14px 4px; border-radius: 12px; border: 2px solid transparent;
  font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
  min-height: 52px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; transition: transform 0.1s, opacity 0.1s;
}
.action-btn:active { transform: scale(0.95); }
.action-btn .icon { font-size: 20px; }

.btn-confirm { background: #14532d; color: var(--green); border-color: var(--green); }
.btn-reject { background: #450a0a; color: var(--red); border-color: var(--red); }
.btn-not-visible { background: #1f2937; color: var(--gray); border-color: var(--gray); }
.btn-not-game-ball { background: #422006; color: #f59e0b; border-color: #f59e0b; }
.btn-skip { background: transparent; color: var(--text-dim); border-color: #444; }
.btn-warmup { background: #431407; color: #fb923c; border-color: #fb923c; }
.btn-gameover { background: #1e1b4b; color: #a78bfa; border-color: #a78bfa; }

/* Toast notification */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #e2e8f0; padding: 10px 20px; border-radius: 8px;
  font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; border: 1px solid #475569; max-width: 90%;
}
.toast.show { opacity: 1; }
.btn-submit-tap {
  background: #1e3a5f; color: var(--blue); border-color: var(--blue);
}

/* Flash overlay */
.flash-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; opacity: 0; z-index: 10;
  transition: opacity 0.15s;
}
.flash-overlay.show { opacity: 1; }
.flash-overlay.green { background: rgba(34, 197, 94, 0.2); }
.flash-overlay.red { background: rgba(239, 68, 68, 0.2); }
.flash-overlay.gray { background: rgba(107, 114, 128, 0.2); }
.flash-overlay.blue { background: rgba(59, 130, 246, 0.2); }
.flash-overlay.amber { background: rgba(245, 158, 11, 0.2); }

/* Stats page */
#stats-page .content { flex: 1; overflow-y: auto; padding: 16px; }
#exclusions-page .content { flex: 1; overflow-y: auto; padding: 12px; }
.stat-card {
  background: var(--surface); border-radius: 12px; padding: 16px;
  margin-bottom: 10px; border: 1px solid #333;
}
.stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

.stat-row { display: flex; gap: 10px; }
.stat-row .stat-card { flex: 1; }

.action-breakdown {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
}
.action-chip {
  padding: 4px 10px; border-radius: 6px; font-size: 13px;
  background: #252525; color: var(--text-dim);
}

/* Exclusion cards */
.excl-section { margin: 16px; }
.excl-section h2 { font-size: 15px; color: var(--text-dim); margin-bottom: 8px; }
.excl-card {
  background: var(--surface); border-radius: 10px; padding: 12px;
  margin-bottom: 12px; border: 1px solid #333;
}
.excl-card .excl-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.excl-card .excl-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.excl-thumbs {
  display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px;
}
.excl-thumbs img {
  width: 80px; height: 80px; object-fit: cover; border-radius: 6px;
  border: 1px solid #444; flex-shrink: 0;
}
.excl-summary {
  background: var(--surface); border-radius: 10px; padding: 16px;
  margin: 16px; border: 1px solid #333; text-align: center;
}
.excl-summary .big-num { font-size: 32px; font-weight: 700; color: var(--blue); }
.excl-summary .label { font-size: 13px; color: var(--text-dim); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Tracking Lab */
#tracking-lab-page .content { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
.lab-header { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid #333; }
.lab-header .lab-title { font-size: 14px; font-weight: 600; }
.lab-header .lab-stats { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.lab-coverage-bar { height: 4px; background: #333; margin-top: 6px; border-radius: 2px; overflow: hidden; position: relative; }
.lab-coverage-fill { height: 100%; background: var(--green); border-radius: 2px; }

.lab-timeline { height: 40px; margin: 0 14px; position: relative; cursor: pointer; touch-action: none; }
.lab-timeline canvas { width: 100%; height: 100%; display: block; }

.lab-tile-view { display: flex; flex-direction: column; align-items: stretch; padding: 0; }
.lab-tile-view canvas { width: 100%; height: auto; display: block; }

.lab-info { padding: 8px 14px; font-size: 12px; color: var(--text-dim); }
.lab-info .lab-time { font-size: 16px; color: var(--text); font-weight: 600; }
.lab-info .lab-dets { margin-top: 2px; }

.lab-alt-dets { display: flex; gap: 4px; padding: 4px 14px; overflow-x: auto; }
.lab-alt-det { width: 60px; height: 60px; border-radius: 6px; border: 2px solid #333; cursor: pointer; flex-shrink: 0; }
.lab-alt-det.active { border-color: var(--green); }
.lab-alt-det.static { border-color: #555; opacity: 0.5; }

.lab-actions { display: flex; gap: 8px; padding: 8px 14px; }
.lab-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.lab-btn-correct { background: #166534; color: #4ade80; }
.lab-btn-wrong { background: #7f1d1d; color: #f87171; }
.lab-btn-note { background: #1e3a5f; color: #60a5fa; }

.lab-notes { padding: 8px 14px; }
.lab-notes textarea { width: 100%; background: var(--surface); border: 1px solid #333; color: var(--text); border-radius: 8px; padding: 8px; font-size: 13px; resize: none; height: 60px; }
.lab-notes .saved { font-size: 11px; color: var(--green); margin-top: 2px; }

.lab-charts { padding: 14px; }
.lab-chart-card { background: var(--surface); border-radius: 10px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
.lab-chart-card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.lab-chart-card canvas { width: 100%; height: 120px; }
</style>
</head>
<body>

<!-- Packet List Page -->
<div id="packet-list-page" class="page active">
  <div class="header">
    <h1>Review Packets</h1>
    <button class="header-btn" onclick="navigateTo('stats')">Stats</button>
  </div>
  <div id="gen-status-banner" style="display:none"></div>
  <div class="content" id="packet-list"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="navigateTo('packets')">
      <span>&#x1F4CB;</span>Packets
    </button>
    <button class="nav-tab" onclick="navigateTo('gap-review')">
      <span>&#x26BD;</span>Gaps
    </button>
    <button class="nav-tab" onclick="navigateTo('tracking-lab')">
      <span>&#x1F3AF;</span>Lab
    </button>
    <button class="nav-tab" onclick="navigateTo('stats')">
      <span>&#x1F4CA;</span>Stats
    </button>
  </div>
</div>

<!-- Annotate Page -->
<div id="annotate-page" class="page">
  <div class="annotate-header">
    <button class="back-btn" onclick="leaveAnnotation()">&larr;</button>
    <span class="progress-text" id="progress-text">0/0</span>
    <div class="progress-track"><div class="progress-inner" id="progress-bar"></div></div>
    <button class="header-btn" id="zoom-btn" onclick="toggleZoom()" title="Zoom to detection">&#x1F50D;</button>
  </div>
  <div class="annotate-body">
    <div class="frame-reason" id="frame-reason"></div>
    <div class="canvas-container">
      <canvas id="crop-canvas"></canvas>
    </div>
    <div class="flash-overlay" id="flash-overlay"></div>
    <div class="toast" id="toast"></div>
    <div class="action-bar" id="action-bar">
      <button class="action-btn btn-confirm" onclick="doAction('confirm')">
        <span class="icon">&#x2713;</span>Confirm
      </button>
      <button class="action-btn btn-reject" onclick="doAction('reject')">
        <span class="icon">&#x2717;</span>Reject
      </button>
      <button class="action-btn btn-not-visible" onclick="doAction('not_visible')">
        <span class="icon">&#x1F441;</span>None
      </button>
      <button class="action-btn btn-skip" onclick="doAction('skip')">
        <span class="icon">&rarr;</span>Skip
      </button>
    </div>
  </div>
</div>

<!-- Stats Page -->
<div id="stats-page" class="page">
  <div class="header">
    <button class="header-btn" onclick="navigateTo('packets')">&larr;</button>
    <h1>Statistics</h1>
  </div>
  <div class="content" id="stats-content"></div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="navigateTo('packets')">
      <span>&#x1F4CB;</span>Packets
    </button>
    <button class="nav-tab" onclick="navigateTo('gap-review')">
      <span>&#x26BD;</span>Gaps
    </button>
    <button class="nav-tab active" onclick="navigateTo('stats')">
      <span>&#x1F4CA;</span>Stats
    </button>
  </div>
</div>

<!-- Tracking Lab Page -->
<div id="tracking-lab-page" class="page">
  <div class="header">
    <button class="header-btn" onclick="navigateTo('packets')">&larr;</button>
    <h1>Tracking Lab</h1>
  </div>
  <div class="content" id="lab-content">
    <div class="loading">Loading tracking lab...</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="navigateTo('packets')">
      <span>&#x1F4CB;</span>Packets
    </button>
    <button class="nav-tab" onclick="navigateTo('gap-review')">
      <span>&#x26BD;</span>Gaps
    </button>
    <button class="nav-tab active" onclick="navigateTo('tracking-lab')">
      <span>&#x1F3AF;</span>Lab
    </button>
    <button class="nav-tab" onclick="navigateTo('stats')">
      <span>&#x1F4CA;</span>Stats
    </button>
  </div>
</div>

<!-- Exclusions Page -->
<div id="exclusions-page" class="page">
  <div class="header">
    <button class="header-btn" onclick="navigateTo('packets')">&larr;</button>
    <h1>Exclusion List</h1>
  </div>
  <div class="content" id="exclusions-content"></div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="navigateTo('packets')">
      <span>&#x1F4CB;</span>Packets
    </button>
    <button class="nav-tab" onclick="navigateTo('gap-review')">
      <span>&#x26BD;</span>Gaps
    </button>
    <button class="nav-tab active" onclick="navigateTo('exclusions')">
      <span>&#x1F6AB;</span>Excluded
    </button>
    <button class="nav-tab" onclick="navigateTo('stats')">
      <span>&#x1F4CA;</span>Stats
    </button>
  </div>
</div>

<!-- Gap Review List Page -->
<div id="gap-review-page" class="page">
  <div class="header">
    <h1>Gap Review</h1>
  </div>
  <div class="content" id="gap-list"></div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="navigateTo('packets')">
      <span>&#x1F4CB;</span>Packets
    </button>
    <button class="nav-tab active" onclick="navigateTo('gap-review')">
      <span>&#x26BD;</span>Gaps
    </button>
    <button class="nav-tab" onclick="navigateTo('tracking-lab')">
      <span>&#x1F3AF;</span>Lab
    </button>
    <button class="nav-tab" onclick="navigateTo('stats')">
      <span>&#x1F4CA;</span>Stats
    </button>
  </div>
</div>

<!-- Gap Annotate Page (reviewing individual gaps) -->
<div id="gap-annotate-page" class="page">
  <div class="annotate-header">
    <button class="back-btn" onclick="leaveGapReview()">&larr;</button>
    <span class="progress-text" id="gap-progress-text">0/0</span>
    <div class="progress-track"><div class="progress-inner" id="gap-progress-bar"></div></div>
  </div>
  <div class="annotate-body">
    <div class="frame-reason" id="gap-info">Loading...</div>
    <div style="padding:8px 12px; overflow-x:auto; flex:1; display:flex; align-items:center;">
      <img id="gap-filmstrip" style="max-height:100%; border-radius:8px;" />
    </div>
    <!-- Track confirmation buttons -->
    <div class="action-bar" id="gap-confirm-bar">
      <button class="action-btn" onclick="gapAction('confirm')" style="background:var(--green);color:#000;flex:2;">
        <span class="icon">&#x2714;</span>Yes — Ball Circled Correctly
      </button>
      <button class="action-btn" onclick="gapAction('reject')" style="background:var(--red);color:#fff;flex:1;">
        <span class="icon">&#x2717;</span>Wrong — Not the Ball
      </button>
      <button class="action-btn btn-skip" onclick="gapAction('cant_tell')" style="flex:1;">
        <span class="icon">&rarr;</span>Can't Tell
      </button>
    </div>
    <!-- Gap filling buttons (shown after track is confirmed) -->
    <div class="action-bar" id="gap-fill-bar" style="display:none;">
      <div style="padding:4px 12px; overflow:hidden; display:flex; align-items:center; justify-content:center; max-height:40%;">
        <canvas id="gap-tile-canvas" style="max-width:100%; max-height:100%; border-radius:8px; touch-action:none;"></canvas>
      </div>
      <button class="action-btn btn-confirm" onclick="gapAction('locate')" style="background:var(--green);color:#000;">
        <span class="icon">&#x1F3AF;</span>Ball Here
      </button>
      <button class="action-btn btn-reject" onclick="gapAction('out_of_play')" style="background:var(--red);color:#fff;">
        <span class="icon">&#x2197;</span>Out
      </button>
      <button class="action-btn btn-not-visible" onclick="gapAction('obscured')" style="background:var(--blue);color:#fff;">
        <span class="icon">&#x1F441;</span>Hidden
      </button>
      <button class="action-btn btn-skip" onclick="gapAction('cant_tell')">
        <span class="icon">&rarr;</span>Skip
      </button>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let currentGameId = null;
let manifest = null;
let frames = [];
let reviewedSet = new Set();
let currentFrameIndex = 0;  // index into frames array
let pendingResults = [];
let frameStartTime = 0;
let userTap = null;  // {x, y} in image coords
let cropImage = null;
let isZoomed = false;

const BATCH_SIZE = 10;
const API = '';

// ========== Navigation ==========
function navigateTo(page, param) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (page !== 'packets' && genPollInterval) { clearInterval(genPollInterval); genPollInterval = null; }
  if (page === 'packets') {
    document.getElementById('packet-list-page').classList.add('active');
    location.hash = '#packets';
    loadPackets();
  } else if (page === 'annotate' && param) {
    document.getElementById('annotate-page').classList.add('active');
    location.hash = '#annotate/' + param;
    startAnnotation(param);
  } else if (page === 'exclusions') {
    document.getElementById('exclusions-page').classList.add('active');
    location.hash = '#exclusions';
    loadExclusions();
  } else if (page === 'tracking-lab') {
    document.getElementById('tracking-lab-page').classList.add('active');
    location.hash = '#tracking-lab';
    loadTrackingLab();
  } else if (page === 'gap-review') {
    document.getElementById('gap-review-page').classList.add('active');
    location.hash = '#gap-review';
    loadGapReviews();
  } else if (page === 'gap-annotate' && param) {
    document.getElementById('gap-annotate-page').classList.add('active');
    location.hash = '#gap-annotate/' + param;
    startGapReview(param);
  } else if (page === 'stats') {
    document.getElementById('stats-page').classList.add('active');
    location.hash = '#stats';
    loadStats();
  }
  updateNavTabs(page);
}

function updateNavTabs(page) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  // handled by page-specific tabs
}

function handleHash() {
  const hash = location.hash || '#packets';
  if (hash.startsWith('#annotate/')) {
    const gameId = hash.replace('#annotate/', '');
    navigateTo('annotate', gameId);
  } else if (hash === '#exclusions') {
    navigateTo('exclusions');
  } else if (hash === '#tracking-lab') {
    navigateTo('tracking-lab');
  } else if (hash === '#gap-review') {
    navigateTo('gap-review');
  } else if (hash.startsWith('#gap-annotate/')) {
    const packetId = hash.replace('#gap-annotate/', '');
    navigateTo('gap-annotate', packetId);
  } else if (hash === '#stats') {
    navigateTo('stats');
  } else {
    navigateTo('packets');
  }
}

// ========== Packet List ==========
let genPollInterval = null;

async function loadPackets() {
  const container = document.getElementById('packet-list');
  container.innerHTML = '<div class="loading">Loading packets...</div>';
  try {
    const resp = await fetch(API + '/api/packets');
    const packets = await resp.json();
    if (packets.length === 0) {
      const notifBtn = Notification.permission === 'granted'
        ? '<button class="action-btn btn-confirm" style="margin:16px auto;flex:none;padding:12px 24px" onclick="testNotification()">&#x1F514; Test Notification</button>'
        : '<button class="action-btn btn-submit-tap" style="margin:16px auto;flex:none;padding:12px 24px" onclick="setupNotifications()">&#x1F514; Enable Notifications</button>';
      container.innerHTML = '<div class="empty-state"><div class="icon">&#x1F4E6;</div><div>No review packets available yet</div><div style="margin-top:12px;font-size:13px">Packets will appear here after model training completes</div>' + notifBtn + '</div>';
      return;
    }
    container.innerHTML = packets.map(p => {
      const pct = p.frame_count > 0 ? Math.round(p.reviewed_count / p.frame_count * 100) : 0;
      return `
        <div class="packet-card" onclick="navigateTo('annotate','${p.game_id}')">
          <div class="title">${p.game_id}<span class="status-badge ${p.status}">${p.status}</span></div>
          <div class="meta">${p.reviewed_count} / ${p.frame_count} frames reviewed</div>
          <div class="progress-bar"><div class="progress-fill ${p.status}" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = '<div class="loading">Failed to load packets</div>';
  }

  // Start polling for generation progress
  pollGenProgress();
  if (genPollInterval) clearInterval(genPollInterval);
  genPollInterval = setInterval(pollGenProgress, 2000);
}

async function pollGenProgress() {
  const banner = document.getElementById('gen-status-banner');
  if (!banner) return;
  try {
    const resp = await fetch(API + '/api/generate-progress');
    const pg = await resp.json();
    if (pg.active) {
      const pctVal = pg.pct != null ? Math.round(pg.pct * 100) : 0;
      banner.style.display = 'block';
      banner.innerHTML = `
        <div style="padding:10px 14px;background:#1a2a1a;border-bottom:1px solid #333">
          <div style="font-size:13px;color:#7c7;margin-bottom:6px">Generating next packet...</div>
          <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">${pg.detail || ''}</div>
          <div style="height:6px;background:#333;border-radius:3px;overflow:hidden">
            <div style="height:100%;background:#4a4;width:${pctVal}%;transition:width 0.3s;border-radius:3px"></div>
          </div>
        </div>`;
    } else if (pg.phase === 'done') {
      banner.style.display = 'block';
      banner.innerHTML = `
        <div style="padding:10px 14px;background:#1a2a1a;border-bottom:1px solid #333">
          <div style="font-size:13px;color:#7c7">${pg.detail || 'Packet ready!'}</div>
        </div>`;
      // Refresh packet list and stop polling
      if (genPollInterval) { clearInterval(genPollInterval); genPollInterval = null; }
      setTimeout(() => { banner.style.display = 'none'; loadPackets(); }, 2000);
    } else {
      banner.style.display = 'none';
    }
  } catch {
    banner.style.display = 'none';
  }
}

// ========== Annotation ==========
async function startAnnotation(gameId) {
  currentGameId = gameId;
  pendingResults = [];
  userTap = null;

  try {
    const resp = await fetch(API + '/api/packets/' + gameId);
    manifest = await resp.json();
    frames = manifest.frames || [];
    reviewedSet = new Set(manifest.reviewed_frames || []);

    // Resume from saved position or first unreviewed
    const saved = localStorage.getItem('pos_' + gameId);
    if (saved !== null) {
      currentFrameIndex = Math.min(parseInt(saved), frames.length - 1);
    } else {
      currentFrameIndex = findNextUnreviewed(-1);
    }

    if (frames.length === 0) {
      alert('No frames in this packet');
      navigateTo('packets');
      return;
    }

    showFrame();
  } catch (e) {
    alert('Failed to load packet: ' + e.message);
    navigateTo('packets');
  }
}

function findNextUnreviewed(fromIndex) {
  for (let i = fromIndex + 1; i < frames.length; i++) {
    if (!reviewedSet.has(frames[i].frame_idx)) return i;
  }
  // Wrap around
  for (let i = 0; i <= fromIndex && i < frames.length; i++) {
    if (!reviewedSet.has(frames[i].frame_idx)) return i;
  }
  // All reviewed — return same index to trigger completion check
  return fromIndex;
}

function showFrame() {
  if (currentFrameIndex < 0 || currentFrameIndex >= frames.length) return;

  const frame = frames[currentFrameIndex];
  userTap = null;
  isZoomed = false;
  frameStartTime = Date.now();
  const zBtn = document.getElementById('zoom-btn');
  if (zBtn) zBtn.classList.remove('active');

  // Save position
  localStorage.setItem('pos_' + currentGameId, currentFrameIndex);

  // Update progress
  const reviewed = reviewedSet.size;
  const total = frames.length;
  document.getElementById('progress-text').textContent = `${reviewed}/${total}`;
  document.getElementById('progress-bar').style.width = (total > 0 ? reviewed / total * 100 : 0) + '%';

  // Reason text
  const det = frame.model_detection;
  let reasonText = '';
  if (frame.reason === 'tracking_loss') {
    const ctx = frame.context || {};
    const traj = ctx.trajectory_length || 1;
    const secs = ctx.time_secs || 0;
    const mins = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    const pct = Math.round((ctx.pct_through || 0) * 100);
    reasonText = `${mins}:${s.toString().padStart(2,'0')} (${pct}%) \u2014 tracked ${traj}f then lost (r${ctx.row || '?'}c${ctx.col || '?'})`;
  } else if (frame.reason === 'gold_standard_verify') {
    reasonText = 'Verify: tap ball or mark No Ball';
  } else if (frame.reason === 'gold_standard_search') {
    reasonText = 'Search: tap ball if visible, else No Ball';
  } else {
    reasonText = frame.reason ? frame.reason.replace(/_/g, ' ') : '';
    if (det && det.confidence !== undefined) {
      reasonText += ` (${det.confidence.toFixed(2)})`;
    }
  }
  if (reviewedSet.has(frame.frame_idx)) {
    reasonText = '[already reviewed] ' + reasonText;
  }
  document.getElementById('frame-reason').textContent = reasonText;

  // If all frames are reviewed, auto-trigger completion
  if (reviewedSet.size >= frames.length) {
    flushResults().then(() => onPacketComplete());
    return;
  }

  // Show default action bar
  showDefaultActions();

  // Load image
  const img = new Image();
  img.onload = () => {
    cropImage = img;
    drawCanvas();
  };
  img.onerror = () => {
    cropImage = null;
    const canvas = document.getElementById('crop-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 400;
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 0, 400, 400);
    ctx.fillStyle = '#888';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Image failed to load', 200, 200);
  };
  img.src = API + '/api/packets/' + currentGameId + '/crops/' + frame.frame_idx;
}

function drawCanvas() {
  const canvas = document.getElementById('crop-canvas');
  const ctx = canvas.getContext('2d');
  if (!cropImage) return;

  const container = canvas.parentElement;
  const cw = container.clientWidth - 8;
  const ch = container.clientHeight - 8;

  const imgW = cropImage.naturalWidth;
  const imgH = cropImage.naturalHeight;

  const frame = frames[currentFrameIndex];

  if (isZoomed && frame.model_detection) {
    // Zoomed view: 3x zoom centered on detection, no overlay
    const zoomFactor = 3;
    const zoomSize = 160; // pixels of source image to show
    const det = frame.model_detection;

    // Source rectangle centered on detection
    let sx = det.x - zoomSize / 2;
    let sy = det.y - zoomSize / 2;
    sx = Math.max(0, Math.min(imgW - zoomSize, sx));
    sy = Math.max(0, Math.min(imgH - zoomSize, sy));

    const canvasSize = Math.min(cw, ch);
    canvas.width = canvasSize;
    canvas.height = canvasSize;
    canvas.dataset.scale = canvasSize / zoomSize;
    canvas.dataset.imgW = imgW;
    canvas.dataset.imgH = imgH;
    canvas.dataset.zoomOffsetX = sx;
    canvas.dataset.zoomOffsetY = sy;

    // Draw zoomed region without any overlays
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(cropImage, sx, sy, zoomSize, zoomSize, 0, 0, canvasSize, canvasSize);

    // Thin subtle crosshair at center so you can see what was detected
    const cx = (det.x - sx) * (canvasSize / zoomSize);
    const cy = (det.y - sy) * (canvasSize / zoomSize);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(cx - 30, cy); ctx.lineTo(cx + 30, cy);
    ctx.moveTo(cx, cy - 30); ctx.lineTo(cx, cy + 30);
    ctx.stroke();
    ctx.setLineDash([]);
    return;
  }

  // Normal view: scale to fit
  const scale = Math.min(cw / imgW, ch / imgH);
  const dw = Math.floor(imgW * scale);
  const dh = Math.floor(imgH * scale);

  canvas.width = dw;
  canvas.height = dh;
  canvas.dataset.scale = scale;
  canvas.dataset.imgW = imgW;
  canvas.dataset.imgH = imgH;
  delete canvas.dataset.zoomOffsetX;
  delete canvas.dataset.zoomOffsetY;

  ctx.drawImage(cropImage, 0, 0, dw, dh);

  // Draw model detection (blue) or tracking hint (dashed orange)
  if (frame.model_detection) {
    const mx = frame.model_detection.x * scale;
    const my = frame.model_detection.y * scale;
    const r = Math.max(12, 18 * scale);
    const isHint = frame.reason === 'tracking_loss';

    if (isHint) {
      // Dashed orange circle = "ball was here last frame, find it now"
      ctx.strokeStyle = 'rgba(245, 158, 11, 0.7)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.arc(mx, my, r + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.font = `bold ${Math.max(11, 13 * scale)}px sans-serif`;
      ctx.fillStyle = 'rgba(245, 158, 11, 0.7)';
      ctx.textAlign = 'left';
      ctx.fillText('prev', mx + r + 6, my - 4);
    } else {
      // Solid blue crosshair = model detection
      ctx.strokeStyle = 'rgba(59, 130, 246, 0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(mx, my, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx - r - 4, my); ctx.lineTo(mx + r + 4, my);
      ctx.moveTo(mx, my - r - 4); ctx.lineTo(mx, my + r + 4);
      ctx.stroke();

      // Confidence label
      if (frame.model_detection.confidence !== undefined) {
        const label = frame.model_detection.confidence.toFixed(2);
        ctx.font = `bold ${Math.max(11, 13 * scale)}px sans-serif`;
        ctx.fillStyle = 'rgba(59, 130, 246, 0.9)';
        ctx.textAlign = 'left';
        ctx.fillText(label, mx + r + 4, my - 4);
      }
    }
  }

  // Draw user tap (green)
  if (userTap) {
    const ux = userTap.x * scale;
    const uy = userTap.y * scale;
    const r = Math.max(12, 18 * scale);

    ctx.strokeStyle = 'rgba(34, 197, 94, 0.9)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(ux, uy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ux - r - 4, uy); ctx.lineTo(ux + r + 4, uy);
    ctx.moveTo(ux, uy - r - 4); ctx.lineTo(ux, uy + r + 4);
    ctx.stroke();

    // Fill center dot
    ctx.fillStyle = 'rgba(34, 197, 94, 0.7)';
    ctx.beginPath();
    ctx.arc(ux, uy, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function toggleZoom() {
  const frame = frames[currentFrameIndex];
  if (!frame.model_detection && !userTap) return;
  isZoomed = !isZoomed;
  drawCanvas();
  // Update button appearance
  const btn = document.getElementById('zoom-btn');
  if (btn) btn.classList.toggle('active', isZoomed);
}

function showDefaultActions() {
  const frame = frames[currentFrameIndex];
  const isGoldStandard = !frame.model_detection;
  const isTrackingLoss = frame.reason === 'tracking_loss';

  if (isTrackingLoss) {
    // Tracking loss: ball moved from prev position, must tap new location
    document.getElementById('action-bar').innerHTML = `
      <button class="action-btn btn-not-visible" onclick="doAction('not_visible')">
        <span class="icon">&#x1F6AB;</span>No Ball
      </button>
      <button class="action-btn btn-not-game-ball" onclick="doAction('not_game_ball')">
        <span class="icon">&#x26BD;</span>Other
      </button>
      <button class="action-btn btn-warmup" onclick="markWarmup()">
        <span class="icon">&#x23EE;</span>Warmup
      </button>
      <button class="action-btn btn-gameover" onclick="markGameOver()">
        <span class="icon">&#x23ED;</span>End
      </button>
      <button class="action-btn btn-skip" onclick="doAction('skip')">
        <span class="icon">&rarr;</span>Skip
      </button>`;
  } else if (isGoldStandard) {
    // Gold-standard mode: no model prediction to confirm/reject
    // User taps ball location or marks "no ball"
    document.getElementById('action-bar').innerHTML = `
      <button class="action-btn btn-not-visible" onclick="doAction('not_visible')">
        <span class="icon">&#x1F6AB;</span>No Ball
      </button>
      <button class="action-btn btn-not-game-ball" onclick="doAction('not_game_ball')">
        <span class="icon">&#x26BD;</span>Other
      </button>
      <button class="action-btn btn-warmup" onclick="markWarmup()">
        <span class="icon">&#x23EE;</span>Warmup
      </button>
      <button class="action-btn btn-gameover" onclick="markGameOver()">
        <span class="icon">&#x23ED;</span>End
      </button>
      <button class="action-btn btn-skip" onclick="doAction('skip')">
        <span class="icon">&rarr;</span>Skip
      </button>`;
  } else {
    document.getElementById('action-bar').innerHTML = `
      <button class="action-btn btn-confirm" onclick="doAction('confirm')">
        <span class="icon">&#x2713;</span>Confirm
      </button>
      <button class="action-btn btn-not-game-ball" onclick="doAction('not_game_ball')">
        <span class="icon">&#x26BD;</span>Other
      </button>
      <button class="action-btn btn-not-visible" onclick="doAction('not_visible')">
        <span class="icon">&#x1F441;</span>None
      </button>
      <button class="action-btn btn-skip" onclick="doAction('skip')">
        <span class="icon">&rarr;</span>Skip
      </button>`;
  }
}

function showTapActions() {
  const frame = frames[currentFrameIndex];
  const actionLabel = frame.model_detection ? 'Adjust' : 'Locate';
  document.getElementById('action-bar').innerHTML = `
    <button class="action-btn btn-submit-tap" onclick="submitTap()" style="flex:2">
      <span class="icon">&#x2713;</span>${actionLabel}
    </button>
    <button class="action-btn btn-skip" onclick="cancelTap()">
      <span class="icon">&#x2717;</span>Cancel
    </button>
    <button class="action-btn btn-skip" onclick="doAction('skip')">
      <span class="icon">&rarr;</span>Skip
    </button>`;
}

// Canvas tap handling
document.getElementById('crop-canvas').addEventListener('pointerdown', function(e) {
  e.preventDefault();
  const rect = this.getBoundingClientRect();
  const scale = parseFloat(this.dataset.scale) || 1;
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  // Convert to image coordinates (accounting for zoom offset)
  const zoomOffsetX = parseFloat(this.dataset.zoomOffsetX) || 0;
  const zoomOffsetY = parseFloat(this.dataset.zoomOffsetY) || 0;
  userTap = {
    x: Math.round(cx / scale + zoomOffsetX),
    y: Math.round(cy / scale + zoomOffsetY)
  };

  // Exit zoom when tapping to place a marker
  if (isZoomed) {
    isZoomed = false;
    const zBtn = document.getElementById('zoom-btn');
    if (zBtn) zBtn.classList.remove('active');
  }

  drawCanvas();
  showTapActions();
  vibrate(10);
});

function submitTap() {
  if (!userTap) return;
  const frame = frames[currentFrameIndex];
  const action = frame.model_detection ? 'adjust' : 'locate';
  doAction(action, { x: userTap.x, y: userTap.y });
}

function cancelTap() {
  userTap = null;
  drawCanvas();
  showDefaultActions();
}

function doAction(action, ballPos) {
  vibrate(15);

  const frame = frames[currentFrameIndex];
  const duration = Date.now() - frameStartTime;

  const result = {
    frame_idx: frame.frame_idx,
    action: action,
    ball_position: ballPos || null,
    duration_ms: duration
  };

  pendingResults.push(result);
  reviewedSet.add(frame.frame_idx);

  // Auto-skip nearby frames for "not_game_ball" (static out-of-play balls)
  let autoSkipped = 0;
  if (action === 'not_game_ball') {
    autoSkipped = autoSkipNearby(frame, 'not_game_ball');
  }

  // Flash
  const flashColor = {
    confirm: 'green', reject: 'red', not_visible: 'gray',
    not_game_ball: 'amber', skip: 'gray', adjust: 'blue', locate: 'blue'
  }[action] || 'gray';
  flashScreen(flashColor);

  if (autoSkipped > 0) {
    showToast(`Auto-skipped ${autoSkipped} nearby frame${autoSkipped > 1 ? 's' : ''} with similar balls`);
  }

  // Batch submit
  if (pendingResults.length >= BATCH_SIZE) {
    flushResults();
  }

  // Advance to next unreviewed
  setTimeout(async () => {
    const next = findNextUnreviewed(currentFrameIndex);
    if (next === currentFrameIndex && reviewedSet.has(frames[next].frame_idx)) {
      // All done — flush remaining results then generate next packet
      await flushResults();
      onPacketComplete();
      return;
    }
    currentFrameIndex = next;
    showFrame();
  }, 180);
}

function autoSkipNearby(sourceFrame, action) {
  // Find unreviewed frames within ±60s game time with similar detection positions
  const ctx = sourceFrame.context || {};
  const srcTime = ctx.time_secs || 0;
  const srcDet = sourceFrame.model_detection;
  const TIME_WINDOW = 60; // seconds
  const POS_THRESHOLD = 80; // pixels — detections closer than this are "same ball"
  let count = 0;

  for (let i = 0; i < frames.length; i++) {
    const f = frames[i];
    if (reviewedSet.has(f.frame_idx)) continue;

    const fCtx = f.context || {};
    const fTime = fCtx.time_secs || 0;
    if (Math.abs(fTime - srcTime) > TIME_WINDOW) continue;

    // Check if detection position is similar (same static ball)
    if (srcDet && f.model_detection) {
      const dx = srcDet.x - f.model_detection.x;
      const dy = srcDet.y - f.model_detection.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Also check same tile row/col
      if (dist < POS_THRESHOLD && fCtx.row === ctx.row && fCtx.col === ctx.col) {
        pendingResults.push({
          frame_idx: f.frame_idx,
          action: action,
          ball_position: null,
          duration_ms: 0,
          auto_skipped: true
        });
        reviewedSet.add(f.frame_idx);
        count++;
      }
    }
  }
  return count;
}

function markWarmup() {
  vibrate(30);
  const frame = frames[currentFrameIndex];
  const ctx = frame.context || {};
  const cutoffTime = ctx.time_secs || 0;
  let count = 0;

  for (let i = 0; i < frames.length; i++) {
    const f = frames[i];
    if (reviewedSet.has(f.frame_idx)) continue;
    const fTime = (f.context || {}).time_secs || 0;
    if (fTime <= cutoffTime) {
      pendingResults.push({
        frame_idx: f.frame_idx,
        action: 'skip',
        ball_position: null,
        duration_ms: 0,
        auto_skipped: true,
        warmup: true
      });
      reviewedSet.add(f.frame_idx);
      count++;
    }
  }

  flashScreen('amber');
  showToast(`Marked ${count} earlier frame${count !== 1 ? 's' : ''} as warmup`);

  if (pendingResults.length >= BATCH_SIZE) {
    flushResults();
  }

  // Advance past warmup
  setTimeout(async () => {
    const next = findNextUnreviewed(currentFrameIndex);
    if (next === currentFrameIndex && reviewedSet.has(frames[next].frame_idx)) {
      await flushResults();
      onPacketComplete();
      return;
    }
    currentFrameIndex = next;
    showFrame();
  }, 180);
}

function markGameOver() {
  vibrate(30);
  const frame = frames[currentFrameIndex];
  const ctx = frame.context || {};
  const cutoffTime = ctx.time_secs || 0;
  const gameId = ctx.game_id || '';
  let count = 0;

  for (let i = 0; i < frames.length; i++) {
    const f = frames[i];
    if (reviewedSet.has(f.frame_idx)) continue;
    const fCtx = f.context || {};
    const fTime = fCtx.time_secs || 0;
    const fGame = fCtx.game_id || '';
    // Only skip frames from the same game that are at or after this time
    if (fGame === gameId && fTime >= cutoffTime) {
      pendingResults.push({
        frame_idx: f.frame_idx,
        action: 'skip',
        ball_position: null,
        duration_ms: 0,
        auto_skipped: true,
        game_over: true
      });
      reviewedSet.add(f.frame_idx);
      count++;
    }
  }

  flashScreen('blue');
  showToast(`Marked ${count} later frame${count !== 1 ? 's' : ''} as post-game`);

  if (pendingResults.length >= BATCH_SIZE) {
    flushResults();
  }

  setTimeout(async () => {
    const next = findNextUnreviewed(currentFrameIndex);
    if (next === currentFrameIndex && reviewedSet.has(frames[next].frame_idx)) {
      // All done — flush remaining results then generate next packet
      await flushResults();
      onPacketComplete();
      return;
    }
    currentFrameIndex = next;
    showFrame();
  }, 180);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function onPacketComplete() {
  // Update counter to show all frames reviewed
  document.getElementById('reason-text').textContent = `${frames.length}/${frames.length} — Generating...`;

  // Show generating state with progress bar
  const actionBar = document.getElementById('action-bar');
  actionBar.innerHTML = `<div style="color:var(--text-dim);text-align:center;padding:16px;width:100%">
    Packet complete! Generating next packet from your feedback...<br>
    <div id="gen-progress-detail" style="font-size:13px;margin:8px 0;opacity:0.8"></div>
    <div style="height:6px;background:#333;border-radius:3px;overflow:hidden;margin:4px 24px">
      <div id="gen-progress-bar" style="height:100%;background:var(--accent);width:0%;transition:width 0.3s"></div>
    </div>
    <span style="font-size:12px;opacity:0.6">This takes a few minutes (scanning tiles on disk)</span>
  </div>`;

  // Start polling for progress
  const progressInterval = setInterval(async () => {
    try {
      const pr = await fetch('/api/generate-progress');
      const pg = await pr.json();
      if (pg.active && pg.detail) {
        const bar = document.getElementById('gen-progress-bar');
        const detail = document.getElementById('gen-progress-detail');
        if (detail) detail.textContent = pg.detail;
        if (bar && pg.pct != null) bar.style.width = Math.round(pg.pct * 100) + '%';
      }
    } catch {}
  }, 2000);

  try {
    const resp = await fetch('/api/generate-packet', { method: 'POST' });
    clearInterval(progressInterval);
    const data = await resp.json();
    if (data.status === 'created' && data.packet_id) {
      showToast(`New packet ready: ${data.packet_id}`);
      // Auto-open the new packet
      setTimeout(() => startAnnotation(data.packet_id), 500);
    } else {
      showToast('No more candidates — all exclusions applied');
      navigateTo('packets');
    }
  } catch (err) {
    clearInterval(progressInterval);
    showToast('Generation failed: ' + err.message);
    navigateTo('packets');
  }
}

function flashScreen(color) {
  const el = document.getElementById('flash-overlay');
  el.className = 'flash-overlay ' + color + ' show';
  setTimeout(() => el.classList.remove('show'), 150);
}

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// ========== Batch submit ==========
async function flushResults() {
  if (pendingResults.length === 0 || !currentGameId) return;

  const toSend = pendingResults.splice(0);
  try {
    await fetch(API + '/api/packets/' + currentGameId + '/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ results: toSend })
    });
  } catch (e) {
    // Re-queue on failure
    pendingResults.unshift(...toSend);
    console.error('Failed to submit results:', e);
  }
}

let touchStartX = 0;
let touchStartY = 0;
document.getElementById('crop-canvas').addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive: true });

document.getElementById('crop-canvas').addEventListener('touchend', function(e) {
  if (e.changedTouches.length === 1) {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
      if (dx < 0) {
        // Swipe left = skip
        doAction('skip');
      }
    }
  }
}, { passive: true });

async function setupNotifications() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) {
    alert('Notifications are not supported in this browser');
    return;
  }

  const permission = await Notification.requestPermission();
  if (permission === 'granted') {
    const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    reg.active?.postMessage('start-polling');
    // Also send on new SW activation
    navigator.serviceWorker.ready.then(r => r.active.postMessage('start-polling'));
    alert('Notifications enabled! You\'ll be notified when new packets are available.');
  } else {
    alert('Notification permission denied. Enable it in browser settings.');
  }
}

async function testNotification() {
  if (!('Notification' in window)) {
    alert('Notifications not supported');
    return;
  }
  if (Notification.permission !== 'granted') {
    await setupNotifications();
    return;
  }
  const reg = await navigator.serviceWorker.ready;
  await reg.showNotification('Test notification', {
    body: 'Notifications are working! You\'ll be notified when new review packets are ready.',
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>",
    tag: 'test',
  });
}

      for (const fb of fbList) {

function labCoverageWithUserMarks() {
  if (!labManifest) return labManifest ? labManifest.coverage_pct : 0;

  let tracked = 0;
  for (const f of labManifest.frames) {
    if (f.has_ball || labUserMarks[f.frame_idx]) tracked++;
  }
  return total > 0 ? Math.round(tracked / total * 1000) / 10 : 0;
}

function drawLabTimeline() {
  const canvas = document.getElementById('lab-timeline-canvas');
  if (!canvas || !labManifest) return;
  const frames = labManifest.frames;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 80;
  canvas.style.height = '40px';
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, w, h);

  const n = frames.length;
  if (n === 0) return;

  // Draw detection density
  for (let i = 0; i < n; i++) {
    const x = (i / n) * w;
    const pw = Math.max(w / n, 1);
    const f = frames[i];

    const hasUserMark = !!labUserMarks[f.frame_idx];

    if (hasUserMark) {
      ctx.fillStyle = '#f59e0b';
      ctx.fillRect(x, 0, pw, h * 0.7);
    } else if (f.has_ball && f.is_predicted) {
      ctx.fillStyle = '#a78bfa';
      ctx.fillRect(x, 0, pw, h * 0.5);
    } else if (f.has_ball) {
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(x, 0, pw, h * 0.6);
    } else if (f.detection_count > 0) {
      ctx.fillStyle = '#eab308';
      ctx.fillRect(x, 0, pw, h * 0.4);
    } else {
      ctx.fillStyle = '#333';
      ctx.fillRect(x, 0, pw, h * 0.2);
    }

    // Show feedback markers
    if (labFeedback[f.frame_idx]) {
      const fb = labFeedback[f.frame_idx];
      ctx.fillStyle = fb.action === 'correct' ? '#4ade80' : fb.action === 'mark_ball' ? '#f59e0b' : fb.action === 'wrong' ? '#f87171' : fb.action === 'occluded' ? '#eab308' : '#60a5fa';
      ctx.fillRect(x, h * 0.7, pw, h * 0.3);
    }
  }

  // Draw current position
  const cx = (labFrameIdx / n) * w;
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 1, 0, 3, h);
}

function labTimelineClick(e) {
  const canvas = document.getElementById('lab-timeline-canvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const idx = Math.max(0, Math.min(labManifest.frames.length - 1, Math.floor(x * labManifest.frames.length)));
  labShowFrame(idx);
}

function labTimelineTouch(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width;
  const idx = Math.max(0, Math.min(labManifest.frames.length - 1, Math.floor(x * labManifest.frames.length)));
  labShowFrame(idx);
}

function labNavFrame(delta) {
  // Remember current tile position before navigating
  if (labCurrentTile) {
    labLastConfirmedTile = { row: labCurrentTile.row, col: labCurrentTile.col };
  }
  const newIdx = Math.max(0, Math.min(labManifest.frames.length - 1, labFrameIdx + delta));
  labShowFrame(newIdx);
}

function labNavDetection(direction) {
  // Jump to next/prev frame that has a detection or user mark
  let idx = labFrameIdx + direction;
  while (idx >= 0 && idx < labManifest.frames.length) {
    const f = labManifest.frames[idx];
    if (f.has_ball || f.detection_count > 0 || labUserMarks[f.frame_idx]) {
      labShowFrame(idx);
      return;
    }
    idx += direction;
  }
  showToast('No more detections');
}

async function labShowFrame(idx) {
  labFrameIdx = idx;
  const frame = labManifest.frames[idx];
  if (!frame) return;

  // Fetch available tiles for this frame
  try {
    const resp = await fetch(`/api/tracking-lab/tiles/${frame.frame_idx}`);
    labAvailableTiles = await resp.json();
  } catch {
    labAvailableTiles = [];
  }

  const timeMins = Math.floor(frame.time_secs / 60);
  const timeSecs = Math.floor(frame.time_secs % 60);
  const timeStr = `${timeMins}:${timeSecs.toString().padStart(2, '0')}`;

  const info = document.getElementById('lab-info');
  const best = frame.best_candidate;
  const userMark = labUserMarks[frame.frame_idx];
  let trajInfo = '';
  if (best && best.traj_id != null) {
    const traj = labManifest.trajectories.find(t => t.traj_id === best.traj_id);
    if (traj) trajInfo = ` | traj #${best.traj_id} (${traj.length}f)`;
  }

  const fbMark = labFeedback[frame.frame_idx] ? ` [${labFeedback[frame.frame_idx].action}]` : '';
  const userMarkText = userMark ? ` | YOU: r${userMark.row}c${userMark.col}` : '';
  const isPredicted = frame.is_predicted;
  const status = userMark ? 'MANUAL DETECTION' : (best && isPredicted) ? 'PREDICTED' : best ? 'TRACKED' : (frame.detection_count > 0 ? 'UNTRACKED (has dets)' : 'NO DETECTIONS');
  const statusColor = userMark ? '#f59e0b' : isPredicted ? '#a78bfa' : best ? '#4ade80' : (frame.detection_count > 0 ? '#eab308' : '#ef4444');

  info.innerHTML = `
    <div class="lab-time">${timeStr} <span style="font-size:12px;color:var(--text-dim)">(${idx+1}/${labManifest.frames.length})</span>
      <span style="font-size:12px;color:${statusColor};margin-left:8px">${status}</span></div>
    <div class="lab-dets">${frame.detection_count} auto-dets | ${labAvailableTiles.length} tiles${trajInfo}${userMarkText}${fbMark}</div>
  `;

  // Decide which tile to show first
  if (userMark) {
    labTileIdx = labAvailableTiles.findIndex(t => t.row === userMark.row && t.col === userMark.col);
    if (labTileIdx < 0) labTileIdx = 0;
  } else if (best) {
    labTileIdx = labAvailableTiles.findIndex(t => t.row === best.row && t.col === best.col);
    if (labTileIdx < 0) labTileIdx = 0;
  } else if (labLastConfirmedTile) {
    // Continuity: show same tile position as last confirmed frame
    labTileIdx = labAvailableTiles.findIndex(t => t.row === labLastConfirmedTile.row && t.col === labLastConfirmedTile.col);
    if (labTileIdx < 0) labTileIdx = 0;
  } else {
    labTileIdx = 0;
  }

  labLoadCurrentTile();
  drawLabTimeline();
  labUpdateNotHereBtn();
}

function labCycleTile(delta) {
  if (labAvailableTiles.length === 0) return;
  labTileIdx = (labTileIdx + delta + labAvailableTiles.length) % labAvailableTiles.length;
  labLoadCurrentTile();
}

function labLoadCurrentTile() {
  if (labAvailableTiles.length === 0) {
    labCurrentTile = null;
    const canvas = document.getElementById('lab-tile-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 640; canvas.height = 640;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, 640, 640);
    ctx.fillStyle = '#555';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No tiles for this frame', 320, 320);
    return;
  }

  const tile = labAvailableTiles[labTileIdx];
  labCurrentTile = tile;
  const frame = labManifest.frames[labFrameIdx];

  // Update tile position label
  const posEl = document.getElementById('lab-tile-pos');
  const excKey = `${frame.frame_idx}:${tile.row}:${tile.col}`;
  const isExcluded = labExcluded[excKey];
  if (posEl) posEl.innerHTML = `r${tile.row}c${tile.col} (${labTileIdx+1}/${labAvailableTiles.length})${isExcluded ? ' <span style="color:#ef4444">EXCLUDED</span>' : ''}`;

  const img = new Image();
  img.onload = () => {
    labTileImg = img;
    drawLabTileInteractive();
  };
  const seg = labManifest.segment || '';
  img.src = `/api/tracking-lab/tile/${frame.frame_idx}?row=${tile.row}&col=${tile.col}&seg=${encodeURIComponent(seg)}`;
}

function drawLabTileInteractive() {
  const canvas = document.getElementById('lab-tile-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 640; canvas.height = 640;

  if (labTileImg) {
    ctx.drawImage(labTileImg, 0, 0, 640, 640);
  }

  const frame = labManifest.frames[labFrameIdx];
  const tile = labCurrentTile;
  if (!frame || !tile) return;

  // Draw auto-detections in this tile
  for (const d of (frame.detections || [])) {
    if (d.row !== tile.row || d.col !== tile.col) continue;
    const isBest = frame.best_candidate && d.row === frame.best_candidate.row && d.col === frame.best_candidate.col && d.tile_x === frame.best_candidate.tile_x;
    ctx.strokeStyle = isBest ? '#22c55e' : '#3b82f6';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(d.tile_x, d.tile_y, 15, 0, Math.PI * 2);
    ctx.stroke();
    if (isBest) {
      ctx.beginPath();
      ctx.moveTo(d.tile_x - 25, d.tile_y); ctx.lineTo(d.tile_x + 25, d.tile_y);
      ctx.moveTo(d.tile_x, d.tile_y - 25); ctx.lineTo(d.tile_x, d.tile_y + 25);
      ctx.stroke();
    }
  }

  // Draw Kalman predicted position (purple dashed) if this is a predicted frame
  const bc = frame.best_candidate;
  if (bc && bc.predicted && bc.row === tile.row && bc.col === tile.col) {
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(bc.tile_x, bc.tile_y, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bc.tile_x - 25, bc.tile_y); ctx.lineTo(bc.tile_x + 25, bc.tile_y);
    ctx.moveTo(bc.tile_x, bc.tile_y - 25); ctx.lineTo(bc.tile_x, bc.tile_y + 25);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#a78bfa';
    ctx.font = '12px sans-serif';
    ctx.fillText('PREDICTED', bc.tile_x + 22, bc.tile_y - 22);
  }

  // Draw previous frame's detection as a dim reference
  if (labFrameIdx > 0) {
    const prevFrame = labManifest.frames[labFrameIdx - 1];
    const prevMark = prevFrame ? labUserMarks[prevFrame.frame_idx] : null;
    const prevBest = prevFrame ? prevFrame.best_candidate : null;
    const prev = prevMark || prevBest;
    if (prev && prev.row === tile.row && prev.col === tile.col) {
      const px = prev.x != null ? prev.x : prev.tile_x;
      const py = prev.y != null ? prev.y : prev.tile_y;
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(px, py, 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px - 22, py); ctx.lineTo(px + 22, py);
      ctx.moveTo(px, py - 22); ctx.lineTo(px, py + 22);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = '#888';
      ctx.font = '11px sans-serif';
      ctx.fillText('prev', px + 22, py - 22);
    }
  }

  // Draw user mark if this is the marked tile
  const userMark = labUserMarks[frame.frame_idx];
  if (userMark && userMark.row === tile.row && userMark.col === tile.col) {
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(userMark.x, userMark.y, 20, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(userMark.x - 30, userMark.y); ctx.lineTo(userMark.x + 30, userMark.y);
    ctx.moveTo(userMark.x, userMark.y - 30); ctx.lineTo(userMark.x, userMark.y + 30);
    ctx.stroke();
    ctx.fillStyle = '#f59e0b';
    ctx.font = '14px sans-serif';
    ctx.fillText('YOUR MARK', userMark.x + 25, userMark.y - 25);
  }
}

let labDragging = false;
let labMarksSinceRegen = 0;
let labRegenerating = false;

function labGetTileCoords(event) {
  const canvas = document.getElementById('lab-tile-canvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = 640 / rect.width;
  const scaleY = 640 / rect.height;
  let clientX, clientY;
  if (event.touches && event.touches.length > 0) {
    clientX = event.touches[0].clientX;
    clientY = event.touches[0].clientY;
  } else if (event.changedTouches && event.changedTouches.length > 0) {
    clientX = event.changedTouches[0].clientX;
    clientY = event.changedTouches[0].clientY;
  } else {
    clientX = event.clientX;
    clientY = event.clientY;
  }
  return {
    x: Math.max(0, Math.min(639, Math.round((clientX - rect.left) * scaleX))),
    y: Math.max(0, Math.min(639, Math.round((clientY - rect.top) * scaleY))),
  };
}

function labTilePointerDown(event) {
  event.preventDefault();
  labDragging = true;
  const {x, y} = labGetTileCoords(event);
  labPlaceMark(x, y);
}

function labTilePointerMove(event) {
  if (!labDragging) return;
  event.preventDefault();
  const {x, y} = labGetTileCoords(event);
  labPlaceMark(x, y);
}

function labTilePointerUp(event) {
  if (!labDragging) return;
  labDragging = false;
  const {x, y} = labGetTileCoords(event);
  labPlaceMark(x, y, true);
}

function labPlaceMark(x, y, save) {
  const frame = labManifest.frames[labFrameIdx];
  const tile = labCurrentTile;
  if (!frame || !tile) return;

  labUserMarks[frame.frame_idx] = {
    row: tile.row, col: tile.col, x: x, y: y
  };

  drawLabTileInteractive();

  if (save) {
    const fb = {
      frame_idx: frame.frame_idx,
      time_secs: frame.time_secs,
      action: 'mark_ball',
      row: tile.row, col: tile.col, x: x, y: y,
      timestamp: Date.now(),
    };
    labFeedback[frame.frame_idx] = fb;
    fetch(API + '/api/tracking-lab/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fb),
    }).catch(() => {});

    showToast(`Ball at (${x},${y})`);
    drawLabTimeline();
    updateLabCoverage();
    labUpdateNotHereBtn();

    // Auto-regenerate guide path every 10 marks
    labMarksSinceRegen++;
    if (labMarksSinceRegen >= 10 && !labRegenerating) {
      labRegenerate();
    }
  }
}

async function labRegenerate() {
  labRegenerating = true;
  labMarksSinceRegen = 0;
  showToast('Regenerating guide path...');
  try {
    const resp = await fetch(API + '/api/tracking-lab/regenerate', { method: 'POST' });
    const data = await resp.json();
    if (data.status === 'regenerated') {
      // Reload manifest
      const mResp = await fetch(API + '/api/tracking-lab');
      labManifest = await mResp.json();
      showToast(`Guide updated: ${data.coverage_pct}% tracked`);
      drawLabTimeline();
    }
  } catch (e) {
    showToast('Regen failed: ' + e.message);
  }
  labRegenerating = false;
}

function labUpdateNotHereBtn() {
  const btn = document.getElementById('lab-btn-nothere');
  if (!btn) return;
  const frame = labManifest.frames[labFrameIdx];
  const hasUserMark = frame && labUserMarks[frame.frame_idx];
  btn.textContent = hasUserMark ? 'Clear' : 'Not Here';
}

function updateLabCoverage() {
  const covPct = labCoverageWithUserMarks();
  const covText = document.getElementById('lab-cov-text');
  const covBar = document.getElementById('lab-cov-bar');
  if (covText) covText.textContent = covPct + '% tracked';
  if (covBar) covBar.style.width = covPct + '%';
}

async function labFeedbackAction(action) {
  const frame = labManifest.frames[labFrameIdx];
  if (!frame) return;

  if (action === 'note') {
    const area = document.getElementById('lab-notes-area');
    area.style.display = area.style.display === 'none' ? 'block' : 'none';
    if (area.style.display === 'block') {
      const existing = labFeedback[frame.frame_idx];
      if (existing && existing.note) {
        document.getElementById('lab-note-input').value = existing.note;
      }
    }
    return;
  }

  if (action === 'wrong') {
    const hasUserMark = !!labUserMarks[frame.frame_idx];
    if (hasUserMark) {
      // Clear mode: just remove the user mark
      delete labUserMarks[frame.frame_idx];
      delete labFeedback[frame.frame_idx];
      showToast('Mark cleared');
      drawLabTileInteractive();
      drawLabTimeline();
      updateLabCoverage();
      labUpdateNotHereBtn();
      return;
    }
    // Not Here mode: exclude this tile
    if (labCurrentTile) {
      const excKey = `${frame.frame_idx}:${labCurrentTile.row}:${labCurrentTile.col}`;
      labExcluded[excKey] = true;
      if (frame.best_candidate && frame.best_candidate.row === labCurrentTile.row && frame.best_candidate.col === labCurrentTile.col) {
        frame.best_candidate = null;
        frame.has_ball = false;
      }
    }
  }

  const fb = {
    frame_idx: frame.frame_idx,
    time_secs: frame.time_secs,
    action: action,
    tile: labCurrentTile ? { row: labCurrentTile.row, col: labCurrentTile.col } : null,
    best_candidate: frame.best_candidate,
    detection_count: frame.detection_count,
    timestamp: Date.now(),
  };

  labFeedback[frame.frame_idx] = fb;

  try {
    await fetch(API + '/api/tracking-lab/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fb),
    });
  } catch {}

  if (action === 'correct') {
    // Remember tile position for continuity
    const um = labUserMarks[frame.frame_idx];
    if (um) {
      labLastConfirmedTile = { row: um.row, col: um.col };
    } else if (frame.best_candidate) {
      labLastConfirmedTile = { row: frame.best_candidate.row, col: frame.best_candidate.col };
    } else if (labCurrentTile) {
      labLastConfirmedTile = { row: labCurrentTile.row, col: labCurrentTile.col };
    }
    showToast('Marked correct');
    drawLabTimeline();
    updateLabCoverage();
    // Auto-advance to next frame
    setTimeout(() => {
      if (labFrameIdx < labManifest.frames.length - 1) {
        labShowFrame(labFrameIdx + 1);
      }
    }, 300);
    return;
  } else if (action === 'wrong') {
    showToast('Not here - excluded');
    // Auto-advance to next tile
    labCycleTile(1);
  } else if (action === 'occluded') {
    showToast('Marked as occluded/not visible');
    drawLabTimeline();
    updateLabCoverage();
    // Auto-advance to next frame
    setTimeout(() => {
      if (labFrameIdx < labManifest.frames.length - 1) {
        labShowFrame(labFrameIdx + 1);
      }
    }, 300);
    return;
  }

  drawLabTimeline();
  updateLabCoverage();
}

function drawLabCharts() {
  const container = document.getElementById('lab-charts');
  if (!labManifest) return;

  const frames = labManifest.frames;
  const n = frames.length;

  // Chart 1: Detection count over time
  container.innerHTML = `
    <div class="lab-chart-card">
      <h3>Detections Over Time</h3>
      <canvas id="lab-chart-dets" height="120"></canvas>
    </div>
    <div class="lab-chart-card">
      <h3>Ball Tracking Coverage</h3>
      <canvas id="lab-chart-coverage" height="120"></canvas>
    </div>
    <div class="lab-chart-card">
      <h3>Trajectory Length Distribution</h3>
      <canvas id="lab-chart-trajs" height="120"></canvas>
    </div>
  `;

  // Draw detection count chart
  const detCanvas = document.getElementById('lab-chart-dets');
  if (detCanvas) {
    const ctx = detCanvas.getContext('2d');
    const w = detCanvas.parentElement.clientWidth - 24;
    detCanvas.width = w * 2;
    detCanvas.height = 240;
    detCanvas.style.width = w + 'px';
    detCanvas.style.height = '120px';

    const cw = detCanvas.width, ch = detCanvas.height;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, cw, ch);

    // Bin frames into ~100 buckets
    const buckets = 100;
    const bucketSize = Math.ceil(n / buckets);
    const maxDet = Math.max(...frames.map(f => f.detection_count));

    for (let b = 0; b < buckets; b++) {
      const start = b * bucketSize;
      const end = Math.min(start + bucketSize, n);
      const slice = frames.slice(start, end);
      const avgDet = slice.reduce((s, f) => s + f.detection_count, 0) / slice.length;
      const hasBall = slice.filter(f => f.has_ball).length / slice.length;

      const x = (b / buckets) * cw;
      const bw = cw / buckets;

      // Detection count bar
      const dh = (avgDet / maxDet) * ch * 0.8;
      ctx.fillStyle = '#334155';
      ctx.fillRect(x, ch - dh, bw - 1, dh);

      // Tracked overlay
      const th = hasBall * ch * 0.8;
      ctx.fillStyle = '#22c55e80';
      ctx.fillRect(x, ch - th, bw - 1, th);
    }

    // Legend
    ctx.fillStyle = '#888';
    ctx.font = '18px sans-serif';
    ctx.fillText('gray=all dets  green=tracked', 10, 24);
  }

  // Draw coverage chart (rolling window)
  const covCanvas = document.getElementById('lab-chart-coverage');
  if (covCanvas) {
    const ctx = covCanvas.getContext('2d');
    const w = covCanvas.parentElement.clientWidth - 24;
    covCanvas.width = w * 2;
    covCanvas.height = 240;
    covCanvas.style.width = w + 'px';
    covCanvas.style.height = '120px';

    const cw = covCanvas.width, ch = covCanvas.height;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, cw, ch);

    // Rolling coverage (30-frame window)
    const windowSize = 30;
    const points = [];
    for (let i = 0; i < n; i++) {
      const start = Math.max(0, i - windowSize);
      const end = Math.min(n, i + windowSize);
      const slice = frames.slice(start, end);
      const cov = slice.filter(f => f.has_ball).length / slice.length;
      points.push(cov);
    }

    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
      const x = (i / points.length) * cw;
      const y = ch - points[i] * ch * 0.9 - ch * 0.05;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 90% target line
    ctx.strokeStyle = '#eab30880';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    const targetY = ch - 0.9 * ch * 0.9 - ch * 0.05;
    ctx.beginPath();
    ctx.moveTo(0, targetY);
    ctx.lineTo(cw, targetY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#eab308';
    ctx.font = '18px sans-serif';
    ctx.fillText('90% target', 10, targetY - 5);
  }

  // Draw trajectory distribution chart
  const trajCanvas = document.getElementById('lab-chart-trajs');
  if (trajCanvas && labManifest.trajectories.length > 0) {
    const ctx = trajCanvas.getContext('2d');
    const w = trajCanvas.parentElement.clientWidth - 24;
    trajCanvas.width = w * 2;
    trajCanvas.height = 240;
    trajCanvas.style.width = w + 'px';
    trajCanvas.style.height = '120px';

    const cw = trajCanvas.width, ch = trajCanvas.height;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, cw, ch);

    // Bucket trajectories by length
    const buckets = [
      { label: '2-5', min: 2, max: 5 },
      { label: '6-10', min: 6, max: 10 },
      { label: '11-20', min: 11, max: 20 },
      { label: '21-50', min: 21, max: 50 },
      { label: '51-100', min: 51, max: 100 },
      { label: '100+', min: 101, max: 99999 },
    ];

    const trajs = labManifest.trajectories;
    const bucketCounts = buckets.map(b => ({
      label: b.label,
      moving: trajs.filter(t => t.length >= b.min && t.length <= b.max && t.is_moving).length,
      static: trajs.filter(t => t.length >= b.min && t.length <= b.max && !t.is_moving).length,
    }));

    const maxCount = Math.max(...bucketCounts.map(b => b.moving + b.static), 1);
    const barW = cw / bucketCounts.length;

    for (let i = 0; i < bucketCounts.length; i++) {
      const b = bucketCounts[i];
      const x = i * barW + barW * 0.1;
      const bw = barW * 0.8;

      // Static bar
      const sh = (b.static / maxCount) * ch * 0.75;
      ctx.fillStyle = '#555';
      ctx.fillRect(x, ch - sh - ch * 0.12, bw, sh);

      // Moving bar on top
      const mh = (b.moving / maxCount) * ch * 0.75;
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(x, ch - sh - mh - ch * 0.12, bw, mh);

      // Label
      ctx.fillStyle = '#888';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, x + bw / 2, ch - 4);
    }

    ctx.fillStyle = '#888';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('green=moving  gray=static', 10, 24);
  }
}

async function labLoadMessages() {
  try {
    const resp = await fetch(API + '/api/tracking-lab/messages');
    const msgs = await resp.json();
    const log = document.getElementById('lab-msg-log');
    if (!log) return;
    if (msgs.length === 0) {
      log.innerHTML = '<span style="opacity:0.5">No messages yet. Tell me what you see!</span>';
      return;
    }
    log.innerHTML = msgs.map(m => {
      const d = new Date(m.timestamp * 1000);
      const time = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      const frameRef = m.frame_idx != null ? ` <span style="opacity:0.5">[frame ${m.frame_idx}]</span>` : '';
      const tileRef = m.tile ? ` <span style="opacity:0.5">[r${m.tile.row}c${m.tile.col}]</span>` : '';
      return `<div style="margin-bottom:4px"><span style="color:var(--blue)">${time}</span>${frameRef}${tileRef} ${m.text}</div>`;
    }).join('');
    log.scrollTop = log.scrollHeight;
  } catch {}
}

async function labSendMessage() {
  const input = document.getElementById('lab-msg-input');
  const text = input.value.trim();
  if (!text) return;

  const frame = labManifest ? labManifest.frames[labFrameIdx] : null;

    frame_idx: frame ? frame.frame_idx : null,

  try {
    await fetch(API + '/api/tracking-lab/messages', {
      method: 'POST',

}

async function loadGapReviews() {
  const container = document.getElementById('gap-list');
  container.innerHTML = '<div class="loading">Loading gap reviews...</div>';
  try {
    const resp = await fetch(API + '/api/gap-reviews');
    const packets = await resp.json();
    if (packets.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">&#x26BD;</div><div>No trajectory gaps to review</div><div style="margin-top:12px;font-size:13px">Gaps appear after Sonnet QA runs on games</div></div>';
      return;
    }
    container.innerHTML = packets.map(p => {
      const isConfirm = p.review_type === 'confirm_game_ball';
      const label = isConfirm ? 'Confirm game ball track' : `${p.remaining} gaps remaining`;
      const icon = isConfirm ? '&#x26BD;' : '&#x1F50D;';
      return `
      <div class="packet-card" onclick="navigateTo('gap-annotate', '${p.packet_id}')" style="padding:16px;margin:8px;background:var(--surface);border-radius:12px;cursor:pointer;border:1px solid #333;">
        <div style="font-weight:600;margin-bottom:4px;">${icon} ${p.game_id}</div>
        <div style="font-size:13px;color:#888;">${label}</div>
        <div style="margin-top:8px;height:4px;background:#333;border-radius:2px;overflow:hidden;">
          <div style="height:100%;background:var(--green);width:${Math.round(p.reviewed/Math.max(p.total_gaps,1)*100)}%;border-radius:2px;"></div>

async function startGapReview(packetId) {
  gapPacketId = packetId;
  gapTapPos = null;
  try {
    const resp = await fetch(API + `/api/gap-reviews/${packetId}`);
    gapManifest = await resp.json();
    gapItems = gapManifest.items || gapManifest.gap_items || [];
    gapReviewedSet = new Set();
    // Mark already-reviewed items
    const detailResp = await fetch(API + `/api/gap-reviews/${packetId}`);
    const detail = await detailResp.json();
    gapCurrentIndex = 0;
    // Skip to first unreviewed
    const reviewed = detail.reviewed_count || 0;
    gapCurrentIndex = reviewed;
    if (gapCurrentIndex >= gapItems.length) gapCurrentIndex = gapItems.length - 1;
    updateGapDisplay();
  } catch (err) {
    document.getElementById('gap-info').textContent = 'Error loading gap review';
  }
}

function updateGapDisplay() {
  if (!gapItems.length) return;
  const item = gapItems[gapCurrentIndex];
  if (!item) return;

  const reviewType = gapManifest.review_type || 'gap_review';

  // Progress
  document.getElementById('gap-progress-text').textContent = `${gapCurrentIndex + 1}/${gapItems.length}`;
  const pct = Math.round((gapCurrentIndex + 1) / gapItems.length * 100);
  document.getElementById('gap-progress-bar').style.width = pct + '%';

  if (reviewType === 'confirm_game_ball') {
    // Per-frame track confirmation: show one tile at a time
    const ti = gapManifest.track_info || {};
    const coverage = ti.segment_frames ? Math.round(ti.track_frames / ti.segment_frames * 100) : '?';
    document.getElementById('gap-info').innerHTML =
      `<div>Frame ${gapCurrentIndex + 1} of ${gapItems.length} — Is the <b>game ball</b> circled in red?</div>` +
      `<div style="font-size:12px;color:#888;margin-top:4px;">${gapManifest.game_id} · ${ti.track_frames || '?'} track frames · ${coverage}% coverage</div>`;

    // Show individual tile (not filmstrip)
    const filmstrip = document.getElementById('gap-filmstrip');
    filmstrip.src = API + `/api/gap-reviews/${gapPacketId}/tile/${encodeURIComponent(item.tile_stem)}`;

    // Show confirm buttons, hide gap-fill buttons
    document.getElementById('gap-confirm-bar').style.display = 'flex';
    document.getElementById('gap-fill-bar').style.display = 'none';

  } else {
    // Gap filling mode (future)
    document.getElementById('gap-info').textContent = 'Gap fill (coming soon)';
    document.getElementById('gap-confirm-bar').style.display = 'none';
    document.getElementById('gap-fill-bar').style.display = 'block';
  }
}

async function gapAction(action) {
  if (!gapItems.length || gapCurrentIndex >= gapItems.length) return;
  const item = gapItems[gapCurrentIndex];

  const payload = {
    tile_stem: item.tile_stem,
    action: action,
    ball_position: (action === 'locate' && gapTapPos) ? gapTapPos : null,
  };

  // If "locate" but no tap position, prompt user
  if (action === 'locate' && !gapTapPos) {
    showToast('Tap the ball location on the tile first!');
    return;
  }

  try {
    const resp = await fetch(API + `/api/gap-reviews/${gapPacketId}/result`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const result = await resp.json();

    const colors = { locate: 'var(--green)', out_of_play: 'var(--red)', obscured: 'var(--blue)', cant_tell: '#666' };
    showToast(action === 'locate' ? 'Ball located!' : action.replace('_', ' '), colors[action]);

    // Advance to next
    gapTapPos = null;
    gapCurrentIndex++;
    if (gapCurrentIndex >= gapItems.length) {
      showToast('All gaps reviewed!');
      setTimeout(() => navigateTo('gap-review'), 1000);
    } else {
      updateGapDisplay();
    }
  } catch (err) {
    showToast('Error submitting result');
  }
}

function leaveGapReview() {
  gapPacketId = null;
  gapManifest = null;
  gapItems = [];
  navigateTo('gap-review');
}

</script>
