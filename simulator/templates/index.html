<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Simulator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #0f3460; background: #e0e0e0; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: #16213e; border-radius: 8px; padding: 16px; border: 1px solid #0f3460; }
        .panel h2 { font-size: 14px; text-transform: uppercase; color: #8899aa; margin-bottom: 12px; letter-spacing: 1px; }
        .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #0f3460; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #8899aa; }
        .stat-value { color: #4cc9f0; font-weight: bold; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-on { background: #2d6a4f; color: #95d5b2; }
        .badge-off { background: #6a2d2d; color: #d5959c; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #0f3460; }
        th { color: #8899aa; font-size: 12px; text-transform: uppercase; }
        td { font-size: 13px; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-primary { background: #0f3460; color: white; }
        .btn-primary:hover { background: #1a4a8a; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #2ecc71; }
        .form-row { display: flex; gap: 10px; align-items: end; margin-bottom: 10px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: #8899aa; margin-bottom: 4px; }
        .form-group input, .form-group select { padding: 6px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 13px; }
        #activity-log { max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; }
        #activity-log div { padding: 2px 0; border-bottom: 1px solid #0f3460; }
        .full-width { grid-column: 1 / -1; }
        .size { color: #8899aa; }
    </style>
</head>
<body>
    <h1 id="title">Camera Simulator</h1>

    <div class="grid">
        <div class="panel">
            <h2>Status</h2>
            <div id="status-panel">Loading...</div>
        </div>

        <div class="panel">
            <h2>Recording Schedule</h2>
            <div id="schedule-panel">Loading...</div>
        </div>

        <div class="panel full-width">
            <h2>Upload Recording</h2>
            <form id="upload-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Video File</label>
                        <input type="file" name="file" accept="video/*" required>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="datetime-local" name="start_time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="datetime-local" name="end_time" required>
                    </div>
                    <div class="form-group">
                        <label>Channel</label>
                        <select name="channel"><option value="0">0</option><option value="1">1</option></select>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </div>
            </form>

            <h2 style="margin-top:16px">Generate Test Pattern</h2>
            <form id="generate-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="datetime-local" name="start_time" required>
                    </div>
                    <div class="form-group">
                        <label>Duration (sec)</label>
                        <input type="number" name="duration" value="60" min="5" max="3600">
                    </div>
                    <div class="form-group">
                        <label>Channel</label>
                        <select name="channel"><option value="0">0</option><option value="1">1</option></select>
                    </div>
                    <button type="submit" class="btn btn-success">Generate</button>
                </div>
            </form>
        </div>

        <div class="panel full-width">
            <h2>Recordings (<span id="rec-count">0</span>)</h2>
            <table>
                <thead><tr><th>Camera Path</th><th>Start</th><th>End</th><th>Size</th><th>Ch</th><th></th></tr></thead>
                <tbody id="recordings-body"></tbody>
            </table>
        </div>

        <div class="panel full-width">
            <h2>Activity Log</h2>
            <div id="activity-log"></div>
        </div>
    </div>

    <script>
        function formatSize(bytes) {
            if (bytes > 1024*1024*1024) return (bytes/1024/1024/1024).toFixed(1) + ' GB';
            if (bytes > 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
            if (bytes > 1024) return (bytes/1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function formatTime(iso) {
            try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
        }

        function formatUptime(s) {
            const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
            return `${h}h ${m}m ${sec}s`;
        }

        async function refresh() {
            try {
                const [statusRes, recsRes] = await Promise.all([
                    fetch('/api/status'), fetch('/api/recordings')
                ]);
                const status = await statusRes.json();
                const recs = await recsRes.json();

                document.getElementById('title').textContent =
                    status.camera_type.charAt(0).toUpperCase() + status.camera_type.slice(1) + ' Camera Simulator';

                let statusHtml = '';
                statusHtml += `<div class="stat"><span class="stat-label">Camera Type</span><span class="stat-value">${status.camera_type}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">Uptime</span><span class="stat-value">${formatUptime(status.uptime_seconds)}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">Credentials</span><span class="stat-value">${status.username}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">HTTP Port</span><span class="stat-value">${status.ports.http}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">Web UI Port</span><span class="stat-value">${status.ports.web_ui}</span></div>`;
                if (status.ports.baichuan)
                    statusHtml += `<div class="stat"><span class="stat-label">Baichuan Port</span><span class="stat-value">${status.ports.baichuan}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">Baichuan Connections</span><span class="stat-value">${status.baichuan_connections}</span></div>`;
                statusHtml += `<div class="stat"><span class="stat-label">Recordings</span><span class="stat-value">${status.recording_count}</span></div>`;
                document.getElementById('status-panel').innerHTML = statusHtml;

                let schedHtml = '';
                if (status.camera_type === 'reolink') {
                    const t = status.schedule.TIMING, m = status.schedule.MD;
                    schedHtml += `<div class="stat"><span class="stat-label">TIMING (Continuous)</span><span class="badge ${t?'badge-on':'badge-off'}">${t?'ON':'OFF'}</span></div>`;
                    schedHtml += `<div class="stat"><span class="stat-label">MD (Motion)</span><span class="badge ${m?'badge-on':'badge-off'}">${m?'ON':'OFF'}</span></div>`;
                } else {
                    schedHtml = '<div class="stat"><span class="stat-label">Mode</span><span class="stat-value">Auto</span></div>';
                }
                document.getElementById('schedule-panel').innerHTML = schedHtml;

                document.getElementById('rec-count').textContent = recs.length;
                let tbody = '';
                for (const r of recs) {
                    tbody += `<tr>
                        <td style="font-family:monospace;font-size:12px">${r.camera_path}</td>
                        <td>${formatTime(r.start_time)}</td>
                        <td>${formatTime(r.end_time)}</td>
                        <td class="size">${formatSize(r.size)}</td>
                        <td>${r.channel}</td>
                        <td><button class="btn btn-danger" onclick="deleteRec('${r.id}')">Del</button></td>
                    </tr>`;
                }
                document.getElementById('recordings-body').innerHTML = tbody || '<tr><td colspan="6" style="text-align:center;color:#8899aa">No recordings</td></tr>';

                const logDiv = document.getElementById('activity-log');
                logDiv.innerHTML = status.activity_log.map(l => `<div>${l}</div>`).join('');
                logDiv.scrollTop = logDiv.scrollHeight;

            } catch(e) { console.error('Refresh error:', e); }
        }

        async function deleteRec(id) {
            await fetch(`/api/recordings/${id}`, {method:'DELETE'});
            refresh();
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            await fetch('/api/upload', {method:'POST', body:form});
            e.target.reset();
            refresh();
        });

        document.getElementById('generate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            await fetch('/api/generate', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    start_time: fd.get('start_time'),
                    duration: fd.get('duration'),
                    channel: fd.get('channel'),
                })
            });
            e.target.reset();
            refresh();
        });

        refresh();
        setInterval(refresh, 3000);
    </script>
</body>
</html>
