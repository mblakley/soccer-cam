name: soccer_cam_mobile
description: Soccer camera video processing app for Dahua IP cameras.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  ffmpeg_kit_flutter_new: ^3.0.1
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  video_player: ^2.8.2
  crypto: ^3.0.3
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
