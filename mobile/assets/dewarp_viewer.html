<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dewarp Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #container { width: 100%; height: 100%; position: relative; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    padding: 8px 12px; display: flex; align-items: center; gap: 10px;
    z-index: 10;
  }
  #controls button {
    background: none; border: none; color: #fff; font-size: 20px;
    cursor: pointer; padding: 4px; line-height: 1;
  }
  #progress-bar {
    flex: 1; height: 6px; background: rgba(255,255,255,0.3);
    border-radius: 3px; cursor: pointer; position: relative;
  }
  #progress-fill {
    height: 100%; background: #4caf50; border-radius: 3px;
    pointer-events: none; width: 0%;
  }
  #time { color: #fff; font-size: 12px; font-family: monospace; white-space: nowrap; }
  #tracking-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.5); color: #4caf50; font-family: monospace;
    font-size: 11px; padding: 3px 8px; border-radius: 4px; z-index: 10;
    display: none;
  }
  #tracking-badge.manual { color: #ff9800; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-family: sans-serif; font-size: 16px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="tracking-badge">TRACK</div>
  <div id="loading">Loading video...</div>
  <div id="controls" style="display:none">
    <button id="play-btn">&#9654;</button>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <span id="time">00:00 / 00:00</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./three.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// -- Configuration --
const PAN_SENSITIVITY = 0.003;  // radians per pixel dragged
const ZOOM_SENSITIVITY_WHEEL = 0.5; // degrees per wheel delta unit
const ZOOM_SENSITIVITY_PINCH = 0.15; // degrees per pinch pixel
const MIN_FOV = 10;   // degrees (zoomed in)
const MAX_FOV = 80;   // degrees (zoomed out)
const INITIAL_FOV = 40; // degrees
const SRC_HFOV = Math.PI; // 180 degrees horizontal
const SRC_WIDTH = 4096;
const SRC_HEIGHT = 1800;
const YAW_LIMIT = Math.PI * 0.47; // ~85 degrees each way
const PITCH_LIMIT = 1.2; // radians (~69 degrees) -- needs to exceed CAMERA_TILT to see near field

// Physical camera tilt: the Dahua B180 is mounted on a pole, tilted
// downward from horizontal. This angle (radians) corrects for the tilt
// so that panning left/right keeps the horizon level in the output.
const CAMERA_TILT = 0.55; // radians (~31 degrees down from horizontal)

// Default virtual camera pitch (in world space). 0 = horizontal.
// Positive = look down toward the field. Set equal to CAMERA_TILT to
// center the default view on the camera's optical axis (mid-field).
const DEFAULT_PITCH = 0.55;

// Virtual PTZ state
let yaw = 0;    // radians, 0 = center
let pitch = DEFAULT_PITCH;
let vFov = THREE.MathUtils.degToRad(INITIAL_FOV); // vertical FOV in radians

// -- Video source from URL params --
const params = new URLSearchParams(window.location.search);
const videoSrc = params.get('src');
if (!videoSrc) {
  document.getElementById('loading').textContent = 'No video source. Pass ?src=/path/to/video.mp4';
}

// -- Tracking data --
// ball_track.json: { fps, frames: [{ frame, yaw, pitch, fov, ... }] }
// Pipeline coords: yaw=0 center, pitch=0 image center
// Viewer coords: yaw=0 center, pitch=CAMERA_TILT = image center
const trackingSrc = params.get('track');
let trackingData = null;       // parsed tracking JSON
let trackingEnabled = false;   // auto-follow active
let manualOverrideUntil = 0;   // timestamp when manual override expires
const MANUAL_TIMEOUT = 3000;   // ms after drag before tracking resumes
const TRACKING_SMOOTH = 0.97;  // EMA smoothing (higher = smoother, slower response)
const MAX_YAW_RATE = 0.15;    // max radians per render frame (~60fps -> ~9 rad/s)
const MAX_PITCH_RATE = 0.08;  // max pitch change per render frame

function smoothTrackingData(data) {
  // Remove (0,0) spikes: if a frame is at (0,0) and neighbors aren't, interpolate
  const frames = data.frames;
  for (let i = 1; i < frames.length - 1; i++) {
    const prev = frames[i - 1], cur = frames[i], next = frames[i + 1];
    const isZero = Math.abs(cur.yaw) < 0.01 && Math.abs(cur.pitch) < 0.01;
    const prevNonZero = Math.abs(prev.yaw) > 0.01 || Math.abs(prev.pitch) > 0.01;
    const nextNonZero = Math.abs(next.yaw) > 0.01 || Math.abs(next.pitch) > 0.01;
    if (isZero && prevNonZero && nextNonZero) {
      cur.yaw = (prev.yaw + next.yaw) / 2;
      cur.pitch = (prev.pitch + next.pitch) / 2;
      cur.fov = (prev.fov + next.fov) / 2;
    }
  }
  // Multi-pass EMA to pre-smooth the entire track
  const alpha = 0.15;  // low alpha = heavier smoothing
  for (let pass = 0; pass < 3; pass++) {
    // Forward pass
    for (let i = 1; i < frames.length; i++) {
      frames[i].yaw = frames[i - 1].yaw * (1 - alpha) + frames[i].yaw * alpha;
      frames[i].pitch = frames[i - 1].pitch * (1 - alpha) + frames[i].pitch * alpha;
      frames[i].fov = frames[i - 1].fov * (1 - alpha) + frames[i].fov * alpha;
    }
    // Backward pass
    for (let i = frames.length - 2; i >= 0; i--) {
      frames[i].yaw = frames[i + 1].yaw * (1 - alpha) + frames[i].yaw * alpha;
      frames[i].pitch = frames[i + 1].pitch * (1 - alpha) + frames[i].pitch * alpha;
      frames[i].fov = frames[i + 1].fov * (1 - alpha) + frames[i].fov * alpha;
    }
  }
  return data;
}

function loadTrackingFromUrl(url) {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      trackingData = smoothTrackingData(data);
      trackingEnabled = true;
      console.log(`Loaded tracking: ${data.frames.length} frames, ${data.fps} fps (smoothed)`);
    })
    .catch(e => console.error('Failed to load tracking data:', e));
}

// Flutter / external API
window.loadTrackingData = function(jsonString) {
  trackingData = smoothTrackingData(JSON.parse(jsonString));
  trackingEnabled = true;
};

window.toggleTracking = function() {
  trackingEnabled = !trackingEnabled;
  return trackingEnabled;
};

function getTrackingState(videoTime) {
  if (!trackingData || !trackingData.frames || trackingData.frames.length === 0) return null;
  const fps = trackingData.fps || 30;
  const frameIdx = videoTime * fps;
  const frames = trackingData.frames;

  // Clamp to available range
  if (frameIdx <= frames[0].frame) return frames[0];
  if (frameIdx >= frames[frames.length - 1].frame) return frames[frames.length - 1];

  // Binary search for surrounding frames
  let lo = 0, hi = frames.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (frames[mid].frame <= frameIdx) lo = mid; else hi = mid;
  }

  // Linear interpolation
  const a = frames[lo], b = frames[hi];
  const t = (frameIdx - a.frame) / (b.frame - a.frame || 1);
  return {
    yaw: a.yaw + (b.yaw - a.yaw) * t,
    pitch: a.pitch + (b.pitch - a.pitch) * t,
    fov: a.fov + (b.fov - a.fov) * t,
    confidence: a.confidence + (b.confidence - a.confidence) * t,
  };
}

// -- Virtual PTZ shader --
// Reprojects from cylindrical panorama to rectilinear view per-pixel.
// The horizon stays level regardless of pan angle (like Veo output).
const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position.xy, 0.0, 1.0);
  }
`;

const fragmentShader = `
  precision highp float;
  uniform sampler2D uVideo;
  uniform float uYaw;        // pan angle (radians)
  uniform float uPitch;      // tilt angle (radians, world space)
  uniform float uFov;        // vertical FOV (radians)
  uniform float uAspect;     // output width / height
  uniform float uCameraTilt; // physical camera downward tilt (radians)
  uniform float uSrcHFov;    // source horizontal FOV (radians)
  uniform float uSrcVRange;  // source vertical range on unit cylinder

  varying vec2 vUv;

  void main() {
    // Map UV [0,1] to NDC [-1,1]
    vec2 ndc = vUv * 2.0 - 1.0;

    // Ray direction in virtual camera local space (looking along +Z)
    float tanHalf = tan(uFov * 0.5);
    vec3 ray = normalize(vec3(
      ndc.x * tanHalf * uAspect,
      ndc.y * tanHalf,
      1.0
    ));

    // Rotate by pitch (around X axis, in world space)
    float cp = cos(uPitch), sp = sin(uPitch);
    vec3 r1 = vec3(ray.x, cp * ray.y - sp * ray.z, sp * ray.y + cp * ray.z);

    // Rotate by yaw (around world Y axis -- true vertical)
    float cy = cos(uYaw), sy = sin(uYaw);
    vec3 r2 = vec3(cy * r1.x + sy * r1.z, r1.y, -sy * r1.x + cy * r1.z);

    // Transform from world space to camera space.
    // The camera is tilted down by uCameraTilt from horizontal.
    // This rotation around X maps world coords to the camera's frame
    // so the cylindrical projection lookup is correct.
    float ct = cos(uCameraTilt), st = sin(uCameraTilt);
    vec3 r3 = vec3(r2.x, ct * r2.y + st * r2.z, -st * r2.y + ct * r2.z);

    // Convert ray (now in camera space) to cylindrical panorama coordinates
    float theta = atan(r3.x, r3.z);              // azimuth angle
    float yCyl = r3.y / length(r3.xz);           // height on unit cylinder

    // Map to source texture UV
    float srcU = theta / uSrcHFov + 0.5;
    float srcV = yCyl / uSrcVRange + 0.5;

    if (srcU < 0.0 || srcU > 1.0 || srcV < 0.0 || srcV > 1.0) {
      // Blend sky/ground based on world-space ray direction
      float skyFactor = smoothstep(-0.05, 0.25, r2.y);
      vec3 skyColor = vec3(0.82, 0.84, 0.80);    // bright overcast sky
      vec3 groundColor = vec3(0.08, 0.18, 0.08);  // dark field green
      gl_FragColor = vec4(mix(groundColor, skyColor, skyFactor), 1.0);
      return;
    }
    gl_FragColor = texture2D(uVideo, vec2(srcU, srcV));
  }
`;

// -- Main app --
if (videoSrc) {
  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const controlsEl = document.getElementById('controls');
  const playBtn = document.getElementById('play-btn');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const timeEl = document.getElementById('time');

  // Create video element
  const video = document.createElement('video');
  video.crossOrigin = 'anonymous';
  video.preload = 'auto';
  video.playsInline = true;
  video.muted = true;
  video.src = videoSrc;

  // Three.js setup -- orthographic camera + full-screen quad
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.insertBefore(renderer.domElement, controlsEl);

  const scene = new THREE.Scene();
  const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  // Source vertical range: in cylindrical projection with square pixels,
  // the vertical extent = HFOV * (height / width) in "tan(elevation)" units.
  const srcVRange = SRC_HFOV * (SRC_HEIGHT / SRC_WIDTH);

  // Full-screen quad geometry (fills clip space via vertex shader)
  const geometry = new THREE.PlaneGeometry(2, 2);

  const uniforms = {
    uVideo: { value: null },
    uYaw: { value: yaw },
    uPitch: { value: pitch },
    uFov: { value: vFov },
    uAspect: { value: container.clientWidth / container.clientHeight },
    uCameraTilt: { value: CAMERA_TILT },
    uSrcHFov: { value: SRC_HFOV },
    uSrcVRange: { value: srcVRange },
  };

  const material = new THREE.ShaderMaterial({
    vertexShader, fragmentShader, uniforms,
  });

  const quad = new THREE.Mesh(geometry, material);
  scene.add(quad);

  video.addEventListener('loadeddata', () => {
    loadingEl.style.display = 'none';
    controlsEl.style.display = 'flex';

    const texture = new THREE.VideoTexture(video);
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = false;
    uniforms.uVideo.value = texture;

    video.play().catch(() => {});
  });

  video.addEventListener('error', () => {
    const err = video.error;
    loadingEl.textContent = `Failed to load video: ${err ? err.message : 'unknown error'}`;
  });

  video.load();

  // -- Pan/zoom controls --
  let dragging = false;
  let lastX = 0, lastY = 0;

  const canvas = renderer.domElement;
  canvas.style.cursor = 'grab';

  canvas.addEventListener('pointerdown', (e) => {
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    canvas.style.cursor = 'grabbing';
    manualOverrideUntil = Date.now() + MANUAL_TIMEOUT;
  });

  const onPointerUp = () => { dragging = false; canvas.style.cursor = 'grab'; };
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);

  canvas.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;

    // Drag right → view pans left (yaw decreases), like dragging a map
    yaw = THREE.MathUtils.clamp(yaw - dx * PAN_SENSITIVITY, -YAW_LIMIT, YAW_LIMIT);
    pitch = THREE.MathUtils.clamp(pitch + dy * PAN_SENSITIVITY, -PITCH_LIMIT, PITCH_LIMIT);
    uniforms.uYaw.value = yaw;
    uniforms.uPitch.value = pitch;
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const newFov = THREE.MathUtils.clamp(
      THREE.MathUtils.radToDeg(vFov) + e.deltaY * ZOOM_SENSITIVITY_WHEEL,
      MIN_FOV, MAX_FOV
    );
    vFov = THREE.MathUtils.degToRad(newFov);
    uniforms.uFov.value = vFov;
  }, { passive: false });

  // Touch pinch-to-zoom
  let lastTouchDist = 0;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const delta = lastTouchDist - dist;
      lastTouchDist = dist;
      const newFov = THREE.MathUtils.clamp(
        THREE.MathUtils.radToDeg(vFov) + delta * ZOOM_SENSITIVITY_PINCH,
        MIN_FOV, MAX_FOV
      );
      vFov = THREE.MathUtils.degToRad(newFov);
      uniforms.uFov.value = vFov;
    }
  }, { passive: true });

  // -- Player controls --
  let playing = false;

  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (video.paused) { video.play(); } else { video.pause(); }
  });

  video.addEventListener('play', () => { playing = true; playBtn.innerHTML = '&#9646;&#9646;'; });
  video.addEventListener('pause', () => { playing = false; playBtn.innerHTML = '&#9654;'; });

  progressBar.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!video.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    video.currentTime = pct * video.duration;
  });

  // Prevent pan when interacting with controls
  controlsEl.addEventListener('pointerdown', (e) => e.stopPropagation());
  controlsEl.addEventListener('pointermove', (e) => e.stopPropagation());

  function formatTime(t) {
    if (isNaN(t)) return '00:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  // -- Resize --
  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    uniforms.uAspect.value = w / h;
    renderer.setSize(w, h);
  });

  // -- T key toggles tracking --
  document.addEventListener('keydown', (e) => {
    if (e.key === 't' || e.key === 'T') {
      trackingEnabled = !trackingEnabled;
      console.log('Tracking:', trackingEnabled ? 'ON' : 'OFF');
    }
  });

  // Load tracking data from URL param
  const trackingBadge = document.getElementById('tracking-badge');
  if (trackingSrc) loadTrackingFromUrl(trackingSrc);

  // -- Render loop --
  function animate() {
    requestAnimationFrame(animate);

    // Apply tracking data when enabled and not manually overridden
    if (trackingEnabled && trackingData && Date.now() > manualOverrideUntil) {
      const state = getTrackingState(video.currentTime);
      if (state) {
        // Pipeline yaw maps directly to viewer yaw
        const targetYaw = state.yaw;
        // Pipeline pitch=0 is image center = viewer CAMERA_TILT
        const targetPitch = CAMERA_TILT + state.pitch;
        // Pipeline FOV is horizontal degrees; convert to vertical radians
        const aspect = container.clientWidth / container.clientHeight;
        const targetVFov = THREE.MathUtils.degToRad(state.fov / aspect);

        // EMA smooth toward target
        let newYaw = yaw * TRACKING_SMOOTH + targetYaw * (1 - TRACKING_SMOOTH);
        let newPitch = pitch * TRACKING_SMOOTH + targetPitch * (1 - TRACKING_SMOOTH);
        let newFov = vFov * TRACKING_SMOOTH + targetVFov * (1 - TRACKING_SMOOTH);

        // Velocity gate: clamp max change per frame to prevent snapping
        const dyaw = newYaw - yaw;
        const dpitch = newPitch - pitch;
        if (Math.abs(dyaw) > MAX_YAW_RATE) newYaw = yaw + Math.sign(dyaw) * MAX_YAW_RATE;
        if (Math.abs(dpitch) > MAX_PITCH_RATE) newPitch = pitch + Math.sign(dpitch) * MAX_PITCH_RATE;

        yaw = newYaw;
        pitch = newPitch;
        vFov = newFov;

        // Clamp
        yaw = THREE.MathUtils.clamp(yaw, -YAW_LIMIT, YAW_LIMIT);
        pitch = THREE.MathUtils.clamp(pitch, -PITCH_LIMIT, PITCH_LIMIT);
        vFov = THREE.MathUtils.clamp(vFov, THREE.MathUtils.degToRad(MIN_FOV), THREE.MathUtils.degToRad(MAX_FOV));

        uniforms.uYaw.value = yaw;
        uniforms.uPitch.value = pitch;
        uniforms.uFov.value = vFov;
      }
    }

    // Update tracking badge
    if (trackingData) {
      trackingBadge.style.display = 'block';
      if (!trackingEnabled) {
        trackingBadge.textContent = 'TRACK OFF';
        trackingBadge.className = 'manual';
      } else if (Date.now() <= manualOverrideUntil) {
        trackingBadge.textContent = 'MANUAL';
        trackingBadge.className = 'manual';
      } else {
        trackingBadge.textContent = 'TRACKING';
        trackingBadge.className = '';
      }
    }

    if (video.duration) {
      const pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';
      timeEl.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
    renderer.render(scene, orthoCamera);
  }
  animate();

  // -- Flutter communication --
  window.setVideoSrc = function(url) {
    video.src = url;
    video.load();
  };

  window.getCurrentTime = function() {
    return video.currentTime;
  };

  window.getDuration = function() {
    return video.duration || 0;
  };

  window.seekTo = function(seconds) {
    video.currentTime = seconds;
  };

  // Debug helpers for tuning camera tilt
  window.setTilt = function(radians) {
    uniforms.uCameraTilt.value = radians;
  };
  window.setYaw = function(radians) {
    yaw = radians;
    uniforms.uYaw.value = yaw;
  };
  window.setPitch = function(radians) {
    pitch = radians;
    uniforms.uPitch.value = pitch;
  };
  window.setFov = function(degrees) {
    vFov = THREE.MathUtils.degToRad(degrees);
    uniforms.uFov.value = vFov;
  };
}
</script>
</body>
</html>
