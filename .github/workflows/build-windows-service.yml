name: Build Windows Service

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Windows Service
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv

    - name: Install dependencies
      run: |
        uv sync --extra dev --extra tray --extra service

    - name: Extract version information
      id: version
      run: |
        if ($env:GITHUB_REF -like 'refs/tags/*') {
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $BUILD_NUMBER = '0'
        } else {
          $VERSION = '0.0.0'
          $BUILD_NUMBER = git rev-list --count HEAD
        }
        echo "VERSION=$VERSION" >> $env:GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $env:GITHUB_ENV
        echo "version=$VERSION" >> $env:GITHUB_OUTPUT
        echo "build_number=$BUILD_NUMBER" >> $env:GITHUB_OUTPUT

    - name: Update version.py
      shell: pwsh
      run: |
        $content = Get-Content video_grouper/version.py -Raw
        $content = $content -replace 'VERSION = "0\.0\.0"', "VERSION = `"${{ env.VERSION }}`""
        $content = $content -replace 'BUILD_NUMBER = "0"', "BUILD_NUMBER = `"${{ env.BUILD_NUMBER }}`""
        Set-Content video_grouper/version.py $content

    - name: Inject YouTube OAuth credentials
      shell: pwsh
      env:
        SOCCER_CAM_YT_CLIENT_ID: ${{ secrets.SOCCER_CAM_YT_CLIENT_ID }}
        SOCCER_CAM_YT_CLIENT_SECRET: ${{ secrets.SOCCER_CAM_YT_CLIENT_SECRET }}
      run: |
        if ($env:SOCCER_CAM_YT_CLIENT_ID -and $env:SOCCER_CAM_YT_CLIENT_SECRET) {
          @"
        # Auto-generated by GitHub Actions -- do not commit
        YT_CLIENT_ID = "$($env:SOCCER_CAM_YT_CLIENT_ID)"
        YT_CLIENT_SECRET = "$($env:SOCCER_CAM_YT_CLIENT_SECRET)"
        "@ | Set-Content -Path video_grouper/utils/_youtube_secrets.py -Encoding UTF8
          Write-Host "YouTube OAuth credentials injected"
        } else {
          Write-Host "WARNING: YouTube OAuth secrets not configured in GitHub"
        }

    - name: Build service executable
      run: |
        uv run pyinstaller --noconfirm --onefile --windowed --icon=video_grouper/icon.ico --name=VideoGrouperService --distpath=video_grouper/dist --workpath=video_grouper/build video_grouper/service/main.py

    - name: Build tray agent executable
      run: |
        uv run pyinstaller --noconfirm --onefile --windowed --icon=video_grouper/icon.ico --name=VideoGrouperTray --distpath=video_grouper/dist --workpath=video_grouper/build video_grouper/tray/main.py

    - name: Install NSIS
      run: choco install nsis -y

    - name: Build installer
      run: |
        & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DVERSION=${{ env.VERSION }} /DBUILD_NUMBER=${{ env.BUILD_NUMBER }} video_grouper/installer/installer.nsi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VideoGrouper-${{ env.VERSION }}-${{ env.BUILD_NUMBER }}
        path: |
          video_grouper/dist/VideoGrouperSetup.exe
          video_grouper/dist/VideoGrouperService.exe
          video_grouper/dist/VideoGrouperTray.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: VideoGrouper-${{ needs.build.outputs.version }}-${{ needs.build.outputs.build_number }}
        path: artifacts

    - name: Create or update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        body: |
          # VideoGrouper ${{ needs.build.outputs.version }}

          ## Windows Installer
          Download and run `VideoGrouperSetup.exe` to install the Windows application.

          ## Individual Executables
          - `VideoGrouperService.exe` - Windows service
          - `VideoGrouperTray.exe` - System tray agent
        files: |
          artifacts/VideoGrouperSetup.exe
          artifacts/VideoGrouperService.exe
          artifacts/VideoGrouperTray.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
